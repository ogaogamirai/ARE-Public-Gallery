":false,"widthConstraint":{"minimum":100,"maximum":220},"x":-443,"y":-675},{"id":"N_166","label":"制度内改善と多様化","title":"<div style=\"max-width: 300px; white-space: normal; overflow-wrap: break-word; font-size: 12px; color: rgb(71, 85, 105);\">中学校の制服制度が経済的負担、快適性、機能性、ジェンダー多様性への対応といった具体的な課題に直面している状況において、学校や自治体は、生徒間の経済格差を表面化させ、新たな経済的・精神的負担を生み出すことを防ぎ、生徒の精神衛生に悪影響を及ぼさないようにし、多様なニーズに応えるため、私服通学の導入を短絡的な解決策とせず、購入補助、リサイクル制度の充実、耐久性があり手入れが容易な素材の採用、過度に高価なデザインの見直し、多様な体型やジェンダーに配慮したデザイン、季節や活動内容に応じた素材の選択、スラックスとスカートの自由な選択肢の提供など、現行制度内での具体的な改善策を講じ、制服を現代のニーズに合わせた形へと柔軟に見直し、進化させるべきである。</div>","level":2,"color":{"background":"#e0f2fe","border":"#fca5a5"},"font":{"color":"#0c4a6e","size":14},"shape":"box","borderWidth":1,"value":1,"shadow":false,"widthConstraint":{"minimum":100,"maximum":220},"x":-199,"y":-675},{"id":"N_167","label":"私服化の回避","title":"<div style=\"max-width: 300px; white-space: normal; overflow-wrap: break-word; font-size: 12px; color: rgb(71, 85, 105);\">中学校における生徒の服装制度を検討する際、我々（社会、教育関係者）は、生徒が服装に起因する優劣や流行への過度な意識から解放され、より本質的な自己の確立に集中できる環境を維持し、生徒に毎日「何を着るか」という精神的負担や、より複雑な社会問題を学校現場に持ち込むことを避けるため、安易な私服通学の導入を避けるべきである。</div>","level":2,"color":{"background":"#e0f2fe","border":"#fca5a5"},"font":{"color":"#0c4a6e","size":14},"shape":"box","borderWidth":1,"value":1,"shadow":false,"widthConstraint":{"minimum":100,"maximum":220},"x":142,"y":-675},{"id":"N_170","label":"私服通学の導入が新たな経済的・\n...","title":"<div style=\"max-width: 300px; white-space: normal; overflow-wrap: break-word; font-size: 12px; color: rgb(71, 85, 105);\">私服通学の導入が新たな経済的・精神的負担や混乱を生み出すことへの危惧という感情。</div>","level":3,"color":{"background":"#f1f5f9","border":"#fca5a5"},"font":{"color":"#475569","size":14},"shape":"box","borderWidth":1,"value":1,"shadow":false,"widthConstraint":{"minimum":100,"maximum":220},"x":-70,"y":-525},{"id":"N_172","label":"安易な解決策が新たな混乱や負担\n...","title":"<div style=\"max-width: 300px; white-space: normal; overflow-wrap: break-word; font-size: 12px; color: rgb(71, 85, 105);\">安易な解決策が新たな混乱や負担を生徒や家庭にもたらすことへの危惧という感 ,"font":{"color":"#581c87","size":14},"shape":"box","borderWidth":1,"value":1,"shadow":false,"widthConstraint":{"minimum":100,"maximum":220},"x":-482,"y":-375},{"id":"N_200","label":"健全な成長が個人や集団の厚生を\n...","title":"<div style=\"max-width: 300px; white-space: normal; overflow-wrap: break-word; font-size: 12px; color: rgb(71, 85, 105);\">健全な成長が個人や集団の厚生をもたらすという事実。</div>","level":4,"color":{"background":"#dcfce7","border":"#fca5a5"},"font":{"color":"#14532d","size":14},"shape":"box","borderWidth":2,"value":1,"shadow":false,"widthConstraint":{"minimum":100,"maximum":220},"x":-381,"y":-375},{"id":"N_203","label":"社会の安定","title":"<div style=\"max-width: 300px; white-space: normal; overflow-wrap: break-word; font-size: 12px; color: rgb(71, 85, 105);\">社会の安定の重視。</div>","level":9,"color":{"background":"#f3e8ff","border":"#fca5a5"},"font":{"color":"#581c87","size":14},"shape":"box","borderWidth":1,"value":1,"shadow":false,"widthConstraint":{"minimum":100,"maximum":220},"x":-1185,"y":375},{"id":"N_204","label":"秩序が混乱や対立を抑制し、集団\n...","title":"<div style=\"max-width: 300px; white-space: normal; overflow-wrap: break-word; font-size: 12px; color: rgb(71, 85, 105);\">秩序が混乱や対立を抑制し、集団の円滑な機能維持をもたらす力学という事実。</div>","level":9,"color":{"background":"#dcfce7","border":"#fca5a5"},"font":{"color":"#14532d","size":14},"shape":"box","borderWidth":2,"value":1,"shadow":false,"widthConstraint":{"minimum":100,"maximum":220},"x":-987,"y":375},{"id":"N_205","label":"予測可能性が社会・組織の秩序を\n...","title":"<div style=\"max-width: 300px; white-space: normal; overflow-wrap: break-word; font-size: 12px; color: rgb(71, 85, 105);\">予測可能性が社会・組織の秩序をもたらす力学という事実。</div>","level":8,"color":{"background":"#dcfce7","border":"#fca5a5"},"font":{"color":"#14532d","size":14},"shape":"box","borderWidth":1,"value":1,"shadow":false,"widthConstraint":{"minimum":100,"maximum":220},"x":-916,"y":225},{"id":"N_206","label":"社会の秩序","title":"<div style=\"max-width: 300px; white-space: normal; overflow-wrap: break-word; font-size: 12px; color: rgb(71, 85, 105);\">社会の秩序の重視。</div>","level":8,"color":{"background":"#f3e8ff","border":"#fca5a5"},"font":{"color":"#581c87","size":14},"shape":"box","borderWidth":1,"value":1,"shadow":false,"widthConstraint":{"minimum":100,"maximum":220},"x":-763,"y":225},{"id":"N_207","label":"組織の秩序","title":"<div style=\"max-width: 300px; white-space: normal; overflow-wrap: break-word; font-size: 12px; color: rgb(71, 85, 105);\">組織の秩序の重視。</div>","level":8,"color":{"background":"#f3e8ff","border":"#fca5a5"},"font":{"color":"#581c87","size":14},"shape":"box","borderWidth":1,"value":1,"shadow":false,"widthConstraint":{"minimum":100,"maximum":220},"x":-575,"y":225},{"id":"V_WLTH","label":"富/資産","title":"<div style=\"max-width: 300px; white-space: normal; overflow-wrap: break-word; font-size: 12px; color: rgb(71, 85, 105);\">富/資産の追求</div>","level":5,"color":{"background":"#eff6ff","border":"#a855f7"},"font":{"color":"#581c87","size":14},"shape":"ellipse","borderWidth":1,"value":1,"shadow":false,"widthConstraint":{"minimum":100,"maximum":220},"x":-212,"y":-225},{"id":"V_EFFI","label":"効率/合理","title":"<div style=\"max-width: 300px; white-space: normal; overflow-wrap: break-word; font-size: 12px; color: rgb(71, 85, 105);\">効率/合理の追求</div>","level":3,"color":{"background":"#eff6ff","border":"#a855f7"},"font":{"color":"#581c87","size":14},"shape":"ellipse","borderWidth":1,"value":1,"shadow":false,"widthConstraint":{"minimum":100,"maximum":220},"x":1211,"y":-525},{"id":"N_FC_1","label":"中学校制服費用と家計負担の実態","title":"<div style=\"max-width: 300px; white-space: normal; overflow-wrap: break-word; font-size: 12px; color: rgb(71, 85, 105);\">2025年10月30日に公益社団法人セーブ・ザ・チルドレン・ジャパンが公表した調査報告によると、経済的に困難な子育て世帯において、中学校1年生の制服代は平均64,656円に達し、前年度から8,325円上昇している。また、高校1年生の制服代は平均80,621円で、前年度から10,006円上昇している。この調査では、保護者と中高生の約7割が「制服・運動着などを安く買えるようにすること」を必要な支援として回答しており、中高生の約8割が「親がお金のやりくりに苦労していた」と感じている実態が明らかになっている。さらに、高校1年生の保護者の約半数が「経済的な理由により就学を続けられない可能性がある」と回答しており、その負担要因として「制服・指定品の購入費」を挙げている。</div>","level":4,"color":{"background":"#dcfce7","border":"#3b82f6"},"font":{"color":"#14532d","size":14},"shape":"box","borderWidth":2,"value":1,"shadow":false,"widthConstraint":{"minimum":100,"maximum":220},"x":-293,"y":-375},{"id":"N_FC_2","label":"中学校の制服費用は高額で家計の\n経済的負担となっている","title":"<div style=\"max-width: 300px; white-space: normal; overflow-wrap: break-word; font-size: 12px; color: rgb(71, 85, 105);\">2025年10月30日に公益社団法人セーブ・ザ・チルドレン・ジャパンが公表した調査によると、経済的に困難な子育て世帯における中学1年生の制服代は平均64,656円で、前年度より8,325円上昇していることが明らかになりました。この調査では、制服代などの入学時費用が高額化し、家計を圧迫している実態が浮き彫りになっています。 また、2024年10月の徳島市教育委員会のアンケート調査では、保護者の63.4%が制服の悪い点として「値段が高い」と回答しており、制服が高価であるという認識が広く共有されています。</div>","level":4,"color":{"background":"#dcfce7","border":"#3b82f6"},"font":{"color":"#14532d","size":14},"shape":"box","borderWidth":2,"value":1,"shadow":false,"widthConstraint":{"minimum":100,"maximum":220},"x":-195,"y":-375},{"id":"N_FC_3","label":"家庭での制服洗濯は型崩れや手間\nへの懸念があり、共働き家庭では\n特に負担が大きい","title":"<div style=\"max-width: 300px; white-space: normal; overflow-wrap: break-word; font-size: 12px; color: rgb(71, 85, 105);\">2024年のライオンの調査によると、制服の家庭洗濯に関して「時間がない」「型くずれが心配」「洗い方がわからない」といった理由でクリーニングに出す家庭が多いことが示されています。また、2024年の菅公学生服の調査では、制服の家庭洗濯における不安内容として「型崩れ」が最も多く、次いで「生地が傷む」「縮み」「色落ち」「シワがよる」「（翌日までに）乾くかどうか」が挙げられています。さらに、2024年のトンボ学生服の調査では、家庭で制服を洗濯する保護者の半数以上が「週1回」または「月1回」の頻度で洗濯しており、頻繁な手入れが必要であることがうかがえます。共働き家庭では、中高生の制服を含む洗濯物の種類と量が増え、家事負担が大きいという指摘もあります。多くの制服が家庭洗濯可能になっているものの、適切な手入れには洗濯表示の確認、洗濯ネットの使用、弱水流コースの選択、乾燥機の使用を避けるなど、特定の注意点が必要とされています。</div>","level":4,"color":{"background":"#dcfce7","border":"#3b82f6"},"font":{"color":"#14532d","size":14},"shape":"box","borderWidth":2,"value":1,"shadow":false,"widthConstraint":{"minimum":100,"maximum":220},"x":-103,"y":-375},{"id":"N_FC_4","label":"中学校制服の快適性・機能性に関\nする課題と見直しの動向","title":"<div style=\"max-width: 300px; white-space: normal; overflow-wrap: break-word; font-size: 12px; color: rgb(71, 85, 105);\">2023年のカンコー学生服の調査によると、中高生が学校制服に必要だと思うこととして、男子中高生の52.8%が「動きやすさ」、女子中高生の58.7%が「動きやすさ」を挙げており、また、男子中高生の48.7%、女子中高生の62.3%が「暑さ寒さに対応して快適である」ことを重視している。 2022年の安城市の報告では、中学生の制服は半袖か分厚い学生服と幅がなく、1日の寒暖差が大きい日に体温調整がしづらいという課題が指摘されている。 2024年の研究報告では、公立中学校の制服について、生徒が活動性と体温調節のしにくさに大きな問題を感じていることが示されている。 2023年の小牧市のアンケート結果では、制服の見直しについて「必要があると思う」と回答した生徒に加え、「何も思わない」と回答した生徒の中にも、現在の制服に対し「気温に合わせて調整ができない」「動きにくい、きゅうくつ」といった機能性の改善を望む意見が見られた。 これらの課題に対応するため、2026年の学生服業界の動向に関する記事では、猛暑対策や高機能素材を活用したセットアップなど、動きやすさや快適性を重視した「制服のカジュアル化」が進んでおり、ストレッチ素材や吸湿速乾素材を活用した「動ける制服」が快適さを提供し、心理的な安心感にもつながるとされている。</div>","level":4,"color":{"background":"#dcfce7","border":"#3b82f6"},"font":{"color":"#14532d","size":14},"shape":"box","borderWidth":2,"value":1,"shadow":false,"widthConstraint":{"minimum":100,"maximum":220},"x":-9,"y":-375},{"id":"N_FC_5","label":"ジェンダー多様性に対応した制服\nの選択制導入の普及","title":"<div style=\"max-width: 300px; white-space: normal; overflow-wrap: break-word; font-size: 12px; color: rgb(71, 85, 105);\">2023年のカンコー学生服の調査によると、女子スラックスを導入している学校は累計3000校を超えており、全国の中学校・高校でジェンダー多様性に対応した制服の選択制導入が進んでいます。文部科学省は2015年の通知で、性同一性障害の児童生徒へのきめ細やかな対応を求め、自認する性別の制服着用を認めるよう促しており、これを受けて多くの学校が性別に関わらずスカート・スラックス、リボン・ネクタイなどを自由に選択できる「ジェンダーレス制服」を導入しています。例えば、2018年には千葉県柏市立柏の葉中学校が性別を問わず制服を選べる制度を採用し、2023年には埼玉県内の女子制服のある全ての県立高校130校で女子用スラックスが選択可能となる見通しが示されました。これらの取り組みは、生徒が自分らしく学校生活を送るための一助となっています。</div>","level":4,"color":{"background":"#dcfce7","border":"#ef4444"},"font":{"color":"#14532d","size":14},"shape":"box","borderWidth":2,"value":1,"shadow":false,"widthConstraint":{"minimum":100,"maximum":220},"x":95,"y":-375},{"id":"N_FC_6","label":"経済格差と子どものいじめ・仲間\n外れの関連性","title":"<div style=\"max-width: 300px; white-space: normal; overflow-wrap: break-word; font-size: 12px; color: rgb(71, 85, 105);\">2017年のニューズウィークの記事によると、14歳の子どもを持つ親を対象とした統計では、世帯年収200万円未満の家庭で子どものいじめ被害に悩む親の割合が2.8%であり、年収800万円以上の家庭の0.9%と比較して高いことが示されている。また、経済的理由からスマートフォンなどを持てず、仲間外れにされるケースがあるとの指摘もある。 2015年の国際数学・理科教育調査（TIMSS）のデータを用いたRIETIの研究では、中学2年生において、クラス内の社会経済的背景（SES）ランクが高い生徒ほどいじめの被害を受けやすい傾向があり、所得格差の大きい国ほどSESランクの影響が強まることが示唆されている。 さらに、2014年の厚生労働省のデータ（2025年の論文で引用）では、家庭の年収が低くなるほど「子どもがいじめられている」と回答した親の割合が増加している。</div>","level":4,"color":{"background":"#dcfce7","border":"#3b82f6"},"font":{"color":"#14532d","size":14},"shape":"box","borderWidth":2,"value":1,"shadow":false,"widthConstraint":{"minimum":100,"maximum":220},"x":218,"y":-375},{"id":"N_FC_7","label":"制服のメリットとして「毎日の服\n装選びの悩み解消」が上位","title":"<div style=\"max-width: 300px; white-space: normal; overflow-wrap: break-word; font-size: 12px; color: rgb(71, 85, 105);\">2022年7月に菅公学生服が全国の中学・高校生の子どもを持つ保護者3,600名を対象に行った調査によると、学校制服の良い点として「毎日の服装に悩まなくていい」が70.2%で最も多く挙げられており、制服が服装選びの時間と労力を軽減していることが示されています。また、2023年8月にニフティキッズが小中学生を中心とした子どもたち1,647人を対象に行った調査では、私服で登校している小中学生の83%が毎朝自分で着る服を選んでいると回答しており、制服がない場合に服選びに時間と労力がかかっている実態が示唆されています。</div>","level":4,"color":{"background":"#dcfce7","border":"#3b82f6"},"font":{"color":"#14532d","size":14},"shape":"box","borderWidth":2,"value":1,"shadow":false,"widthConstraint":{"minimum":100,"maximum":220},"x":342,"y":-375},{"id":"N_FC_8","label":"制服が学生の自覚、公私のけじめ\n、帰属意識、規律意識を高める効\n果","title":"<div style=\"max-width: 300px; white-space: normal; overflow-wrap: break-word; font-size: 12px; color: rgb(71, 85, 105);\">2024年のJ-Stageに掲載された研究によると、中学生・高校生は学校制服を「所属や立場を自覚させ、学校生活を充実させるための服」と捉えており、「スクールアイデンティティーとスクールプライドの醸成・自覚」や「中学生らしさ、高校生らしさの表現・自覚」といった服育効果が確認されています。また、2023年の菅公学生服の調査では、中高生の51.8%（男子）と66.5%（女子）が制服の良い点として「学生らしく見える」と回答し、19.2%が「公私のけじめがつく」と回答しています。さらに、2022年の菅公学生服による中学校・高校の教員への調査では、中学校教員の35.3%が制服の良い点として「公私のけじめがつく」と回答しています。帰属意識については、2023年の菅公学生服の調査で中高生の18.8%が「学校への帰属意識や仲間意識が高まる」と回答しており、2023年の公益社団法人鳥取県人権文化センターの調査研究でも、制服のメリットとして「学校への帰属意識が生まれ、愛校心を育むことができる」「生徒同士の仲間意識が生まれる」と挙げられています。規律と秩序に関しては、2024年の花栗の保護者調査において、「自由な風習にすると規律が乱れる可能性があるため」という意見が見られます。</div>","level":4,"color":{"background":"#dcfce7","border":"#3b82f6"},"font":{"color":"#14532d","size":14},"shape":"box","borderWidth":2,"value":1,"shadow":false,"widthConstraint":{"minimum":100,"maximum":220},"x":486,"y":-375},{"id":"N_FC_9","label":"制服廃止による家計の衣料費増加\nの可能性","title":"<div style=\"max-width: 300px; white-space: normal; overflow-wrap: break-word; font-size: 12px; color: rgb(71, 85, 105);\">2026年3月1日のKOREA WAVEの報道によると、韓国では1983年の制服自由化政策により多くの学校で制服が廃止されたが、私服購入による家計負担増を理由に約3年で制服が復活した事例がある。また、2025年のセーブ・ザ・チルドレン・ジャパンの調査では、経済的に困難な子育て世帯において、中学1年生の制服代が平均64,656円、高校1年生が80,621円と高額であり、前年度から約1万円上昇していることが明らかになっている。これらの情報から、制服廃止は私服購入を増やし、家庭の衣料費を増加させるという元の事実の「文脈上の趣旨」は成立すると判断できる。</div>","level":4,"color":{"background":"#dcfce7","border":"#3b82f6"},"font":{"color":"#14532d","size":14},"shape":"box","borderWidth":2,"value":1,"shadow":false,"widthConstraint":{"minimum":100,"maximum":220},"x":637,"y":-375},{"id":"N_FC_10","label":"制服が育む学校への帰属意識と連\n帯感","title":"<div style=\"max-width: 300px; white-space: normal; overflow-wrap: break-word; font-size: 12px; color: rgb(71, 85, 105);\">2023年から2024年にかけてのカンコー学生服の調査や徳島市教育委員会のアンケート、および「調査研究：衣 ～アシタ、なに着る？～」によると、学校制服は「学校への帰属意識や愛校心を育むことができる」というメリットが挙げられています。また、株式会社クレオヒューマンが引用する調査では、制服を好んで着用する中高生は「学校の一員であることを自覚し、その学校の生徒であることを誇りに感じている」と回答しており、カンコー学生服が2023年6月に実施した中高生1,000人への調査では、現在の制服について「統一感があるように見える」と回答した中高生が82.2%に上ります。徳島市教育委員会が2024年10月に実施したアンケートでは、制服の良い点として「中学生としての自覚が生まれる」と約2割が回答しています。これらのデータは、制服が集団の連帯感や学生としての自覚を育むという事実を支持しています。</div>","level":4,"color":{"background":"#dcfce7","border":"#3b82f6"},"font":{"color":"#14532d","size":14},"shape":"box","borderWidth":2,"value":1,"shadow":false,"widthConstraint":{"minimum":100,"maximum":220},"x":804,"y":-375},{"id":"N_FC_11","label":"制服による生徒の身分明確化と安\n全確保","title":"<div style=\"max-width: 300px; white-space: normal; overflow-wrap: break-word; font-size: 12px; color: rgb(71, 85, 105);\">2025年のトンボのコラムによると、学校制服は「生徒」としての意識を育み、周囲の大人から「生徒＝未成年＝保護対象」と認識されることで、トラブル発生時に教職員が自校の生徒を瞬時に判断できるようになり、生徒や学校の安全性向上につながるとされています。 また、2025年の山崎幼稚園の解説では、制服は組織への所属感を強め、学生たちに一体感や自らのアイデンティティを持たせる役割を果たすと説明されています。 さらに、Wikipediaの情報では、制服を着用することで校外の時間でも所属校が明らかになり、校外でのトラブル時に学校が判明し、教員の対応が求められる場合があることが示されています。</div>","level":4,"color":{"background":"#dcfce7","border":"#3b82f6"},"font":{"color":"#14532d","size":14},"shape":"box","borderWidth":2,"value":1,"shadow":false,"widthConstraint":{"minimum":100,"maximum":220},"x":975,"y":-375},{"id":"N_FC_12","label":"制服による学校外での識別と安全\n確保の有効性","title":"<div style=\"max-width: 300px; white-space: normal; overflow-wrap: break-word; font-size: 12px; color: rgb(71, 85, 105);\">2025年のトンボのコラムによると、学校制服は周囲の大人から生徒が「未成年＝保護対象」であると認識されるため、周囲の目に留まりやすくなり、トラブルが発生した際に教職員が自校の生徒を瞬時に判断できるようになることで、生徒や学校の安全性向上につながるとされています。また、2023年の調査研究によると、制服は「どこの学校か一目でわかる」という利点があり、登下校中に何かあったときに「すぐに学校に連絡できる」という点で、学校外での識別と安全確保に役立つと指摘されています。さらに、「身なりを整える」ことは、悪の道へと誘いこもうとする大人から声をかけられにくいなど、自分を「守る」ことにもつながるとされています。</div>","level":4,"color":{"background":"#dcfce7","border":"#3b82f6"},"font":{"color":"#14532d","size":14},"shape":"box","borderWidth":2,"value":1,"shadow":false,"widthConstraint":{"minimum":100,"maximum":220},"x":1152,"y":-375},{"id":"N_FC_13","label":"制服廃止は衣料品消費・廃棄を増\n加させ、環境負荷を高める可能性","title":"<div style=\"max-width: 300px; white-space: normal; overflow-wrap: break-word; font-size: 12px; color: rgb(71, 85, 105);\">2024年の環境省の調査によると、日本国内では年間約82万トンの衣料品が市場に供給され、そのうち約7割にあたる56万トンが家庭や事業所から手放されており、多くが未使用のまま廃棄されている。衣類1着の製造には約25.5kgの二酸化炭素が排出され、約2,300リットルの水が消費されるなど、ファッション産業は環境負荷が大きいと指摘されている。一方、学校制服は3年間着用を想定した耐久性・機能性を持ち、再生ポリエステル利用や成長設計、撥水加工による洗濯回数削減、さらにはリユース・リサイクル事業の推進により、衣料品の長期利用と廃棄量削減に貢献し、環境負荷を軽減する可能性がある。</div>","level":4,"color":{"background":"#dcfce7","border":"#3b82f6"},"font":{"color":"#14532d","size":14},"shape":"box","borderWidth":2,"value":1,"shadow":false,"widthConstraint":{"minimum":100,"maximum":220},"x":1339,"y":-375}];
