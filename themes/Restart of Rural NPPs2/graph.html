>社会全体の幸福の重視。</div>","level":5,"color":{"background":"#f3e8ff","border":"#fca5a5"},"font":{"color":"#581c87","size":14},"shape":"box","borderWidth":1,"value":1,"shadow":false,"widthConstraint":{"minimum":100,"maximum":220},"x":-1636,"y":-225},{"id":"N_121","label":"社会全体の安寧","title":"<div style=\"max-width: 300px; white-space: normal; overflow-wrap: break-word; font-size: 12px; color: rgb(71, 85, 105);\">社会全体の安寧の重視。</div>","level":5,"color":{"background":"#f3e8ff","border":"#fca5a5"},"font":{"color":"#581c87","size":14},"shape":"box","borderWidth":1,"value":1,"shadow":false,"widthConstraint":{"minimum":100,"maximum":220},"x":-1256,"y":-225},{"id":"V_TRST","label":"信頼/信用","title":"<div style=\"max-width: 300px; white-space: normal; overflow-wrap: break-word; font-size: 12px; color: rgb(71, 85, 105);\">信頼/信用の追求</div>","level":3,"color":{"background":"#eff6ff","border":"#a855f7"},"font":{"color":"#581c87","size":14},"shape":"ellipse","borderWidth":1,"value":1,"shadow":false,"widthConstraint":{"minimum":100,"maximum":220},"x":-715,"y":-525},{"id":"V_PROG","label":"進歩/革新","title":"<div style=\"max-width: 300px; white-space: normal; overflow-wrap: break-word; font-size: 12px; color: rgb(71, 85, 105);\">進歩/革新の追求</div>","level":10,"color":{"background":"#eff6ff","border":"#a855f7"},"font":{"color":"#581c87","size":14},"shape":"ellipse","borderWidth":1,"value":1,"shadow":false,"widthConstraint":{"minimum":100,"maximum":220},"x":-770,"y":525},{"id":"V_LOVE","label":"連帯/絆","title":"<div style=\"max-width: 300px; white-space: normal; overflow-wrap: break-word; font-size: 12px; color: rgb(71, 85, 105);\">連帯/絆の追求</div>","level":7,"color":{"background":"#eff6ff","border":"#a855f7"},"font":{"color":"#581c87","size":14},"shape":"ellipse","borderWidth":1,"value":1,"shadow":false,"widthConstraint":{"minimum":100,"maximum":220},"x":-1634,"y":75},{"id":"N_FC_1","label":"2025年11月27日の報道に\n...","title":"<div style=\"max-width: 300px; white-space: normal; overflow-wrap: break-word; font-size: 12px; color: rgb(71, 85, 105);\">2025年11月27日の報道によると、北海道電力は泊原子力発電所の再稼働により家庭用電気料金を約11%値下げできると発表しています。また、東京電力は柏崎刈羽原子力発電所の再稼働により年間約1,000億円の燃料費削減効果を見込んでおり、2023年の料金改定では再稼働を前提に値上げ幅を圧縮しています。2023年に新設・運転した場合の発電コスト試算では、原子力発電が12.6円/kWhであるのに対し、LNG火力は19.1円/kWh、石炭火力は24.8円/kWhと、原子力発電が安価であることが示されています。さらに、2024年12月25日のキヤノングローバル戦略研究所の分析では、2040年の既存原子力発電の燃料費は1.9円/kWhと、既存の石炭火力（4.2円/kWh）やLNG火力（6.0円/kWh）と比較して大幅に低いとされています。原子力発電の停止後、火力発電への依存が増加したことで、2010年度比で15.5兆円の燃料費が増加し、国民一人当たり約12万円の負担増になったとのデータもありますという事実。</div>","level":4,"color":{"background":"#dcfce7","border":"#3b82f6"},"font":{"color":"#14532d","size":14},"shape":"box","borderWidth":2,"value":1,"shadow":false,"widthConstraint":{"minimum":100,"maximum":220},"x":-1516,"y":-375},{"id":"N_FC_2","label":"2025年8月5日時点の電気事\n...","title":"<div style=\"max-width: 300px; white-space: normal; overflow-wrap: break-word; font-size: 12px; color: rgb(71, 85, 105);\">2025年8月5日時点の電気事業連合会および自然エネルギー財団のデータによると、日本において新規制基準適合性審査に合格した原子力発電所のうち、14基が再稼働している。これは、新規制基準適合性審査を通過した原発の再稼働が進んでいることを示している。再稼働には原子力規制委員会による審査合格に加え、地元自治体の理解・同意も必要とされている。複数の原発が現在も審査中であり、一部では安全対策工事の遅延やデータ不正操作（例：浜岡原発）により再稼働が遅れるケースも確認されているという事実。</div>","level":4,"color":{"background":"#dcfce7","border":"#3b82f6"},"font":{"color":"#14532d","size":14},"shape":"box","borderWidth":2,"value":1,"shadow":false,"widthConstraint":{"minimum":100,"maximum":220},"x":-1406,"y":-375},{"id":"N_FC_3","label":"2025年2月に閣議決定された\n...","title":"<div style=\"max-width: 300px; white-space: normal; overflow-wrap: break-word; font-size: 12px; color: rgb(71, 85, 105);\">2025年2月に閣議決定された第7次エネルギー基本計画によると、原子力発電は「優れた安定供給性、技術自給率を有し、他電源とそん色ないコスト水準で変動も少なく、一定の出力で安定的に発電可能」であり、エネルギー需給構造の安定性に寄与する重要なベースロード電源として位置づけられています。2023年度の日本の電源構成は火力発電が約68.6%を占めており、海外からの化石燃料依存度が高い日本のエネルギー安全保障を強化し、電力需給ひっ迫のリスクを低減するために、安全性が確認された原子力発電所の再稼働が推進されています。特に、データセンターや半導体工場の新増設により2020年代後半にかけて電力需要が増加する見通しの中で、原子力発電は天候に左右されずに安定した電力を供給できる特性を持つとされていますという事実。</div>","level":4,"color":{"background":"#dcfce7","border":"#3b82f6"},"font":{"color":"#14532d","size":14},"shape":"box","borderWidth":2,"value":1,"shadow":false,"widthConstraint":{"minimum":100,"maximum":220},"x":-1275,"y":-375},{"id":"N_FC_4","label":"2024年（暦年）の環境エネル\n...","title":"<div style=\"max-width: 300px; white-space: normal; overflow-wrap: break-word; font-size: 12px; color: rgb(71, 85, 105);\">2024年（暦年）の環境エネルギー政策研究所の速報値によると、日本国内の全発電電力量に占める自然エネルギーの割合は26.7%に達し、2016年の約15%から増加傾向にある。特に太陽光発電は2023年度に9.8%を占め、2013年度の1.2%から大幅に増加した。政府は2030年度までに再生可能エネルギーの比率を36～38%とする目標を掲げているという事実。</div>","level":4,"color":{"background":"#dcfce7","border":"#3b82f6"},"font":{"color":"#14532d","size":14},"shape":"box","borderWidth":2,"value":1,"shadow":false,"widthConstraint":{"minimum":100,"maximum":220},"x":-1128,"y":-375},{"id":"N_FC_5","label":"2024年および2025年の報\n...","title":"<div style=\"max-width: 300px; white-space: normal; overflow-wrap: break-word; font-size: 12px; color: rgb(71, 85, 105);\">2024年および2025年の報道によると、原子力発電所の再稼働には、法的拘束力はないものの、立地自治体および周辺自治体の理解と同意が事実上不可欠とされている。これは、電力会社と自治体間で締結される原子力安全協定に基づく事前協議や了解条項によるものであり、政府も「立地自治体や住民等関係者の理解と協力が必要」との方針を示している。例えば、2025年12月には新潟県の花角英世知事が柏崎刈羽原発6号機の再稼働に同意を正式に伝達し、北海道の鈴木直道知事も泊原発3号機の再稼働に同意を表明している。これらの同意判断は、安全性確認に加え、避難計画の整備、住民説明、経済効果などを総合的に考慮して行われている。また、福島第一原発事故以降、原子力災害対策重点区域（UPZ）が半径30km圏に拡大されたことで、周辺自治体の同意の重要性も増しているという事実。</div>","level":4,"color":{"background":"#dcfce7","border":"#3b82f6"},"font":{"color":"#14532d","size":14},"shape":"box","borderWidth":2,"value":1,"shadow":false,"widthConstraint":{"minimum":100,"maximum":220},"x":-964,"y":-375},{"id":"N_FC_6","label":"2025年の資源エネルギー庁お\n...","title":"<div style=\"max-width: 300px; white-space: normal; overflow-wrap: break-word; font-size: 12px; color: rgb(71, 85, 105);\">2025年の資源エネルギー庁および原子力発電環境整備機構（NUMO）の発表によると、日本では高レベル放射性廃棄物（使用済み核燃料）の最終処分方法として地層処分が採用されているものの、最終処分地はまだ決定されていません。処分地選定プロセスは「文献調査」「概要調査」「精密調査」の3段階で構成されており、現在、最初のステップである文献調査が北海道の寿都町と神恵内村、佐賀県の玄海町の3つの自治体で実施されていますという事実。</div>","level":4,"color":{"background":"#dcfce7","border":"#3b82f6"},"font":{"color":"#14532d","size":14},"shape":"box","borderWidth":2,"value":1,"shadow":false,"widthConstraint":{"minimum":100,"maximum":220},"x":-792,"y":-375},{"id":"N_FC_7","label":"2024年1月の国際通貨基金（\n...","title":"<div style=\"max-width: 300px; white-space: normal; overflow-wrap: break-word; font-size: 12px; color: rgb(71, 85, 105);\">2024年1月の国際通貨基金（IMF）の報告によると、AIは世界の雇用の約40%に影響を与え、先進国では約60%の雇用が影響を受けると予測されている。このうち先進国の雇用の約半分はAIの統合によって生産性が向上する可能性があるが、残りの半分は労働需要の減少、賃金の低下、雇用機会の喪失といった負の影響を受ける可能性がある。また、AIが仕事を奪うリスクは高賃金の労働者にも及ぶと指摘されているという事実。</div>","level":4,"color":{"background":"#dcfce7","border":"#3b82f6"},"font":{"color":"#14532d","size":14},"shape":"box","borderWidth":2,"value":1,"shadow":false,"widthConstraint":{"minimum":100,"maximum":220},"x":-620,"y":-375},{"id":"N_136","label":"責任追及の徹底","title":"<div style=\"max-width: 300px; white-space: normal; overflow-wrap: break-word; font-size: 12px; color: rgb(71, 85, 105);\">原発事故のような重大な事態において、経営陣が「想定外」を理由に責任を免れる判例が作られつつある現状において、政府および社会は、適切な責任追及を可能にし、将来の同様の事態における無責任な対応を防ぐために、経営陣が「想定外」を言い訳に責任を免れることを許すべきではない。</div>","level":2,"color":{"background":"#e0f2fe","border":"#7dd3fc"},"font":{"color":"#0c4a6e","size":14},"shape":"box","borderWidth":1,"value":1,"shadow":false,"widthConstraint":{"minimum":100,"maximum":220},"x":-443,"y":-675},{"id":"N_137","label":"廃炉・除染推進","title":"<div style=\"max-width: 300px; white-space: normal; overflow-wrap: break-word; font-size: 12px; color: rgb(71, 85, 105);\">放射能汚染された地域が存在し、廃炉計画が遅延し、放射性廃棄物の最終処分に関する言及がない現状において、政府および関係機関は、汚染地域の回復、廃炉の確実な完了、および国民の不安解消のために、除染や廃炉計画への関心を高め、計画を遅滞なく進め、「世界でも経験がない」という言い訳を許さず、放射性廃棄物の最終処分について明確に言及すべきである。</div>","level":2,"color":{"background":"#e0f2fe","border":"#7dd3fc"},"font":{"color":"#0c4a6e","size":14},"shape":"box","borderWidth":1,"value":1,"shadow":false,"widthConstraint":{"minimum":100,"maximum":220},"x":-258,"y":-675},{"id":"N_138","label":"原発村の責任","title":"<div style=\"max-width: 300px; white-space: normal; overflow-wrap: break-word; font-size: 12px; color: rgb(71, 85, 105);\">かつて原発の「絶対安全」を主張していた「原発村」の面々が、事故後に言い訳をしている現状において、社会および政府は、過去の無責任な主張に対する責任を明確にし、信頼を回復するために、彼らの言い訳を許すべきではない。</div>","level":2,"color":{"background":"#e0f2fe","border":"#7dd3fc"},"font":{"color":"#0c4a6e","size":14},"shape":"box","borderWidth":1,"value":1,"shadow":false,"widthConstraint":{"minimum":100,"maximum":220},"x":-64,"y":-675},{"id":"N_139","label":"東電対応の追及","title":"<div style=\"max-width: 300px; white-space: normal; overflow-wrap: break-word; font-size: 12px; color: rgb(71, 85, 105);\">原発政策全体の問題とは別に、東京電力の事故対応に不備があると考えられる現状において、政治は、東京電力の責任を明確にし、適切な対応を促すために、東京電力の対応を追及すべきである。</div>","level":2,"color":{"background":"#e0f2fe","border":"#7dd3fc"},"font":{"color":"#0c4a6e","size":14},"shape":"box","borderWidth":1,"value":1,"shadow":false,"widthConstraint":{"minimum":100,"maximum":220},"x":133,"y":-675},{"id":"N_140","label":"原子力事故で経営陣は想定外で免\n...","title":"<div style=\"max-width: 300px; white-space: normal; overflow-wrap: break-word; font-size: 12px; color: rgb(71, 85, 105);\">原子力事故で経営陣は想定外で免責される判例があるという事実。 / 原子力事故で経営陣は想定外を理由に責任を問われない判例があるという事実。</div>","level":3,"color":{"background":"#dcfce7","border":"#86efac"},"font":{"color":"#14532d","size":20},"shape":"box","borderWidth":5.2,"value":5,"shadow":false,"widthConstraint":{"minimum":100,"maximum":220},"x":-566,"y":-525},{"id":"N_142","label":"経営陣が「想定外」を言い訳に責\n...","title":"<div style=\"max-width: 300px; white-space: normal; overflow-wrap: break-word; font-size: 12px; color: rgb(71, 85, 105);\">経営陣が「想定外」を言い訳に責任を免れる現状に対する懸念と、それを許すべきではないという憤りという感情。</div>","level":3,"color":{"background":"#f1f5f9","border":"#cbd5e1"},"font":{"color":"#475569","size":14},"shape":"box","borderWidth":1,"value":1,"shadow":false,"widthConstraint":{"minimum":100,"maximum":220},"x":-446,"y":-525},{"id":"N_145","label":"事故対応の不備や責任の曖昧さに\n...","title":"<div style=\"max-width: 300px; white-space: normal; overflow-wrap: break-word; font-size: 12px; color: rgb(71, 85, 105);\">事故対応の不備や責任の曖昧さに対する不信感、および政治による厳格な責任追及を求める強い正義感という感情。</div>","level":3,"color":{"background":"#f1f5f9","border":" "widthConstraint":{"minimum":100,"maximum":220},"x":923,"y":-225},{"id":"V_TRUTH","label":"真理/事実","title":"<div style=\"max-width: 300px; white-space: normal; overflow-wrap: break-word; font-size: 12px; color: rgb(71, 85, 105);\">真理/事実の追求</div>","level":10,"color":{"background":"#eff6ff","border":"#a855f7"},"font":{"color":"#581c87","size":14},"shape":"ellipse","borderWidth":1,"value":1,"shadow":false,"widthConstraint":{"minimum":100,"maximum":220},"x":-402,"y":525},{"id":"V_EFFI","label":"効率/合理","title":"<div style=\"max-width: 300px; white-space: normal; overflow-wrap: break-word; font-size: 12px; color: rgb(71, 85, 105);\">効率/合理の追求</div>","level":10,"color":{"background":"#eff6ff","border":"#3b82f6"},"font":{"color":"#581c87","size":14},"shape":"ellipse","borderWidth":3,"value":1,"shadow":{"enabled":true,"color":"rgba(59, 130, 246, 0.4)","size":15},"widthConstraint":{"minimum":100,"maximum":220},"x":-192,"y":525},{"id":"V_RESL","label":"回復力/復元","title":"<div style=\"max-width: 300px; white-space: normal; overflow-wrap: break-word; font-size: 12px; color: rgb(71, 85, 105);\">回復力/復元の追求</div>","level":5,"color":{"background":"#eff6ff","border":"#a855f7"},"font":{"color":"#581c87","size":14},"shape":"ellipse","borderWidth":1,"value":1,"shadow":false,"widthConstraint":{"minimum":100,"maximum":220},"x":1108,"y":-225},{"id":"N_FC_8","label":"福島県における放射能汚染による\n帰還困難区域の存在","title":"<div style=\"max-width: 300px; white-space: normal; overflow-wrap: break-word; font-size: 12px; color: rgb(71, 85, 105);\">2026年3月時点の福島県、経済産業省、および復興庁の発表によると、東京電力福島第一原子力発電所事故による放射能汚染のため、福島県内の7市町村（南相馬市、富岡町、大熊町、双葉町、浪江町、葛尾村、飯舘村）の一部に「帰還困難区域」が現在も設定されており、原則として居住が制限されている。例えば、双葉町では2026年3月11日時点で町の8割以上が帰還困難区域に指定されている。これらの区域では、住民の帰還に向けた除染やインフラ整備が進められており、「特定復興再生拠点区域」や「特定帰還居住区域」の指定・拡大により避難指示解除の取り組みが進められているが、依然として立ち入りが制限されている地域が存在する。2026年3月9日には、福島県が大熊町と葛尾村の「特定帰還居住区域」拡大に向けた計画案に同意し、2029年12月末までに避難指示解除に向けた準備を完了する計画である。</div>","level":4,"color":{"background":"#eff6ff","border":"#3b82f6"},"font":{"color":"#14532d","size":14},"shape":"box","borderWidth":2,"value":1,"shadow":false,"widthConstraint":{"minimum":100,"maximum":220},"x":1006,"y":-375},{"id":"N_FC_9","label":"福島第一原発の廃炉計画に複数年\nの遅延が発生","title":"<div style=\"max-width: 300px; white-space: normal; overflow-wrap: break-word; font-size: 12px; color: rgb(71, 85, 105);\">2026年の東京電力ホールディングスおよび関連報道によると、福島第一原子力発電所の廃炉計画は、当初の予定から複数年にわたる遅延が生じている。例えば、1号機の使用済み燃料取り出し開始は、当初2020年頃の予定から2027～2028年度に延期されており、約7年の遅れとなっている。また、1号機の大型カバー設置も当初2023年度頃の予定から2025年夏頃に延期された。燃料デブリの初号機（2号機）からの取り出し開始も、当初2021年内の予定から、新型コロナウイルス感染症の影響や安全性・確実性向上のため、2024年10月頃に延期されている。これらの進捗状況を踏まえ、廃炉完了目標は2041年～2051年頃とされているが、前例のない挑戦であり、継続的な見直しが行われている。</div>","level":4,"color":{"background":"#eff6ff","border":"#3b82f6"},"font":{"color":"#14532d","size":14},"shape":"box","borderWidth":2,"value":1,"shadow":false,"widthConstraint":{"minimum":100,"maximum":220},"x":1188,"y":-375},{"id":"N_FC_10","label":"廃炉デブリおよび汚染機材の保管\n・処理・処分に関する言及と計画","title":"<div style=\"max-width: 300px; white-space: normal; overflow-wrap: break-word; font-size: 12px; color: rgb(71, 85, 105);\">2024年9月、東京電力ホールディングスは福島第一原発2号機で燃料デブリの試験的取り出しに着手しており、取り出したデブリは金属製の密閉容器に収納し、金属またはコンクリート製の密閉した部屋（一時保管セル）で乾式保管する計画である。また、除染作業で発生した除去土壌や草木などの放射性物質を含む廃棄物については、福島県大熊町と双葉町にまたがる中間貯蔵施設で一時保管されており、2045年3月12日までに福島県外で最終処分することが法律で定められている。経済産業省や国際廃炉研究開発機構（IRID）は、燃料デブリの収納・移送・保管に関する技術開発を含む、多種多様な放射性廃棄物の処理・処分に関する研究開発を支援・実施している。これらの計画や研究開発は、「東京電力ホールディングス（株）福島第一原子力発電所１～４号機の廃止措置等に向けた中長期ロードマップ」に基づき進められている。ただし、燃料デブリなど高濃度放射性廃棄物の最終処分場は、2023年12月時点でもまだ決まっていないという指摘もある。</div>","level":4,"color":{"background":"#eff6ff","border":"#ef4444"},"font":{"color":"#14532d","size":14},"shape":"box","borderWidth":2,"value":1,"shadow":false,"widthConstraint":{"minimum":100,"maximum":220},"x":1369,"y":-375},{"id":"N_FC_11","label":"福島原発事故における旧経営陣の\n刑事責任および民事責任（控訴審\n・最高裁）の免責判例","title":"<div style=\"max-width: 300px; white-space: normal; overflow-wrap: break-word; font-size: 12px; color: rgb(71, 85, 105);\">2023年の東京高等裁判所および2025年の最高裁判所の判決によると、東京電力福島第一原発事故を巡る刑事裁判において、旧経営陣3名（勝俣恒久元会長、武黒一郎元副社長、武藤栄元副社長）は、原発敷地を超える津波の襲来を予見できなかったとして、業務上過失致死傷罪で無罪が確定した。また、2025年の東京高等裁判所の判決によると、株主代表訴訟において、旧経営陣の賠償責任を否定し、巨大津波の襲来の危険性について「切迫感や現実感を抱いたとは認められず、地震発生前の時点で予見可能性があったとはいえない」と判断した。これらの判決は、「想定外」の津波であったことを理由に経営陣の責任を免責する判例となっている。</div>","level":4,"color":{"background":"#eff6ff","border":"#3b82f6"},"font":{"color":"#14532d","size":14},"shape":"box","borderWidth":2,"value":1,"shadow":false,"widthConstraint":{"minimum":100,"maximum":220},"x":1565,"y":-375}];
