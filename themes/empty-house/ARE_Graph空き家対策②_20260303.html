道路\n」が多数存在し、消防車や救急車などの緊急車両の通行を困難にし\nている。これは、建設現場やリフォーム工事、引越し、宅配、ゴミ\n収集、さらには救急や消防といった緊急対応に至るまで深刻な影響\nを与えている。例えば、東京都北区赤羽台3丁目では、約7年前ま\nでブロック塀で入り口が狭く大型緊急車両の侵入が困難だった道路\nが、自治会の働きかけにより拡幅された事例がある。また、大分で\nの火災では、消防車が近づく道の狭さが問題視されており、狭い道\n路に古い木造家屋が密集し、その中に放置された空き家がある状況\nが有事には「凶悪な存在」になると指摘されている。多くの自治体\nでは、セットバック時の補助金や公共工事としての道路拡幅、防災\n重点地域指定による整備優先化などの制度で狭隘道路の整備を支援\nしているが、土地の買収や合意形成に時間がかかっているのが現状\nである。","level":4,"color":{"background":"#f8fafc","border":"#e2e8f0"},"font":{"color":"#cbd5e1"},"shape":"box","borderWidth":1,"shadow":{"enabled":false},"widthConstraint":{"minimum":100,"maximum":220},"x":630,"y":-150},{"id":"N_FC_10","label":"日本の空き家問題の現状と対策の\n喫緊性","title":"2023年時点で全国の空き家数は約900万戸、空き家率は13\n.8%と過去最高を記録。特に問題視される「その他の空き家」は\n385万戸に上る。この問題に対処するため、2015年に「空家\n等対策の推進に関する特別措置法」が施行され、2023年には改\n正されるなど、国や自治体による対策が喫緊の課題として進められ\nている。","level":4,"color":{"background":"#f8fafc","border":"#e2e8f0"},"font":{"color":"#cbd5e1"},"shape":"box","borderWidth":1,"shadow":{"enabled":false},"widthConstraint":{"minimum":100,"maximum":220},"x":712,"y":-150},{"id":"N_FC_11","label":"密集地の空き地放置は火災リスク\nを高め、放火や延焼の具体的な事\n例・法規制が存在","title":"密集地で空き地を放置すると、雑草やゴミなどの可燃物が蓄積し、\n火災リスクが高まるという事実は客観的なデータによって裏付けら\nれています。総務省消防庁の調査によると、令和4年（2022年\n）中の放火による出火件数は2,242件で全火災の6.2％を占\nめ、放火の疑いを含めると3,710件（全火災の10.2％）に\n上ります。また、NPO法人空家・空地管理センターの調べ（平成\n24年）では、出火原因の第1位が「放火」で年間5,340件（\n総出火数の約12.1%）であり、「放火の疑い」と合わせると8\n,524件（総出火数の約19.3%）にも及び、特に都市部で多\nい傾向にあります。管理不全の空き家や空き地は放火の標的になり\nやすく、枯れた草やゴミへの引火、漏電、自然発火などの原因で火\n災が発生し、近隣住宅への延焼リスクも高まります。実際に、20\n25年10月には名古屋市瑞穂区で空き家が全焼し、隣家にも延焼\nする火災が発生しています。このようなリスクに対し、南但広域行\n政事務組合や小山市などの火災予防条例では、空き地の所有者に対\nし枯草等の燃焼のおそれのある物件の除去など火災予防上必要な措\n置を講じるよう規定しています。さらに、2015年には「空家等\n対策に関する特別措置法」が施行され、空き家の適切な管理が促さ\nれています。国土交通省は、2012年の調査で「地震時等に著し\nく危険な密集市街地」を特定し、2030年度までに最低限の安全\n性を確保する目標を掲げており、その対策として老朽建築物の除却\nや公園・空地の整備を推進しています。","level":4,"color":{"background":"#f8fafc","border":"#e2e8f0"},"font":{"color":"#cbd5e1"},"shape":"box","borderWidth":1,"shadow":{"enabled":false},"widthConstraint":{"minimum":100,"maximum":220},"x":833,"y":-150},{"id":"N_FC_12","label":"多くの都市部・住宅密集地で駐車\nスペース不足が深刻","title":"東京都23区では2020年10月時点で約3.7万台の四輪車と\n約5千台の二輪車が路上に違法駐車しており、既存駐車場の有効活\n用や新設が必要とされている。また、金沢市や仙台市などの住宅密\n集地では、近隣の月極駐車場が満車状態であるため、空き家を解体\nして跡地を駐車場として活用する事例が見られる。","level":4,"color":{"background":"#f8fafc","border":"#e2e8f0"},"font":{"color":"#cbd5e1"},"shape":"box","borderWidth":1,"shadow":{"enabled":false},"widthConstraint":{"minimum":100,"maximum":220},"x":974,"y":-150},{"id":"N_FC_13","label":"空き家放置による地域社会への多\n大な悪影響","title":"放置された空き家は、景観の著しい悪化（雑草の繁茂、ゴミの不法\n投棄など）、治安の低下（不法侵入、放火、空き巣、殺人・死体遺\n棄などの犯罪温床化）、および資産価値の減少（2040年には住\n宅価格が2010年比で46%下落する可能性、周辺地域の資産価\n値低下）といった多大な悪影響を地域社会にもたらす。2023年\nには全国の空き家数が900万戸、空き家率が13.8%と過去最\n高を記録しており、政府は「空家等対策特別措置法」に基づき、「\n特定空家」や「管理不全空家」に対して固定資産税の住宅用地特例\nの解除などの措置を講じている。","level":4,"color":{"background":"#f8fafc","border":"#e2e8f0"},"font":{"color":"#cbd5e1"},"shape":"box","borderWidth":1,"shadow":{"enabled":false},"widthConstraint":{"minimum":100,"maximum":220},"x":1080,"y":-150},{"id":"N_FC_14","label":"未指定文化財の潜在的価値と活用\n事例","title":"日本全国には数十万件規模の文化財が存在するが、その多くは国や\n地方自治体による指定を受けていない「未指定文化財」として地域\nに残されている。これらの未指定文化財には、学術的価値が高い遺\n跡や地域の歴史を語る重要な資料、将来的に評価が変わる可能性を\n持つ文化資源が数多く含まれる。例えば、広島県尾道市では、20\n年以上空き家だった建物が、奥のタイルのキッチンや古い建具、尖\nった屋根、洋品店時代のショーウィンドウといった魅力的な歴史的\n要素から解体を免れ、地域活性化に活用された事例がある。また、\n文化庁のデータによると、2023年の空き家は約900万戸に達\nし、国や自治体は文化庁補助金などを活用して空き家を文化施設へ\n転換する支援策を打ち出している。","level":4,"color":{"background":"#f8fafc","border":"#e2e8f0"},"font":{"color":"#cbd5e1"},"shape":"box","borderWidth":1,"shadow":{"enabled":false},"widthConstraint":{"minimum":100,"maximum":220},"x":1221,"y":-150},{"id":"N_FC_15","label":"行政の空き家データ整備不足と民\n間活用阻害","title":"総務省の2023年住宅・土地統計調査によると、全国の空き家数\nは約900万戸に達し、そのうち長期にわたり居住されず適切な管\n理がなされていない可能性が高い「その他の住宅」は約385万戸\n（全体の42.8%）を占めている。多くの自治体で空き家バンク\nの登録物件数が不足しており、市町村の過半数（58.6%）で登\n録物件が0〜9件にとどまっている状況が報告されている。また、\n自治体の空き家対策業務において、54%の自治体が予算や人員体\n制に不満を抱えており、2023年12月に導入された「管理不全\n空家等」の認定基準を約57.4%の自治体がいまだ定めていない\nなど、データ整備や情報公開が不十分な状況が民間企業による空き\n家活用提案を阻害している。","level":4,"color":{"background":"#f8fafc","border":"#e2e8f0"},"font":{"color":"#cbd5e1"},"shape":"box","borderWidth":1,"shadow":{"enabled":false},"widthConstraint":{"minimum":100,"maximum":220},"x":1391,"y":-150},{"id":"N_FC_16","label":"高齢者の社会的孤立と地域コミュ\nニティ希薄化の深刻な実態","title":"日本はOECD加盟国20カ国中、社会的交流が少ない人の割合が\n15.3%と最も高く、約1,092万人の高齢者が孤独・孤立状\n態にあると推計されている。孤独・孤立は死亡リスクを1.3～2\n.8倍高め、一人暮らし高齢者世帯は2050年には1,084万\n世帯に増加予測。地域コミュニティの希薄化は災害対応の遅れや孤\n独死増加、犯罪リスク上昇につながると指摘されている。","level":4,"color":{"background":"#f8fafc","border":"#e2e8f0"},"font":{"color":"#cbd5e1"},"shape":"box","borderWidth":1,"shadow":{"enabled":false},"widthConstraint":{"minimum":100,"maximum":220},"x":1582,"y":-150}];
