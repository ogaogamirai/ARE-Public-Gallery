, 65, 85);\">多くの研究が、SNSでの他者との比較が子供や若者の自尊心を低下させ、劣等感や不安を引き起こすことを示している。</div>","level":8,"color":{"background":"#F8FAFC","border":"#475569","highlight":{"border":"#334155","background":"#F1F5F9"}},"font":{"color":"#1E293B","size":14,"face":"Inter, sans-serif","bold":false,"strokeWidth":0,"strokeColor":"#ffffff"},"shape":"box","borderWidth":3,"value":1,"shadow":{"enabled":true,"color":"rgba(0,0,0,0.08)","size":8,"x":3,"y":3},"widthConstraint":{"minimum":110,"maximum":240},"x":-1465,"y":300},{"id":"N_674","label":"政策と現場の乖離","title":"<div style=\"max-width: 300px; white-space: normal; overflow-wrap: break-word; font-size: 12px; color: rgb(51, 65, 85);\">教員調査や教育報告書は、政策が多様な学校現場の現実、教員の負担、資源不足を十分に反映していないと指摘。政策決定者の現場理解に課題があることを示唆する。</div>","level":6,"color":{"background":"#F8FAFC","border":"#E11D48","highlight":{"border":"#BE123C","background":"#F1F5F9"}},"font":{"color":"#1E293B","size":14,"face":"Inter, sans-serif","bold":false,"strokeWidth":0,"strokeColor":"#ffffff"},"shape":"box","borderWidth":5,"value":1,"shadow":{"enabled":true,"color":"rgba(225, 29, 72, 0.6)","size":30,"x":0,"y":0},"widthConstraint":{"minimum":110,"maximum":240},"x":-645,"y":0},{"id":"N_675","label":"教員ICT格差と教育機会","title":"<div style=\"max-width: 300px; white-space: normal; overflow-wrap: break-word; font-size: 12px; color: rgb(51, 65, 85);\">教員のICT活用能力の差は、生徒が享受できる教育内容や学習機会に不均等を生じさせ、結果として学力やデジタルリテラシーの格差拡大につながる可能性が、国内外の教育機関や研究で指摘されています。</div>","level":4,"color":{"background":"#F8FAFC","border":"#475569","highlight":{"border":"#334155","background":"#F1F5F9"}},"font":{"color":"#1E293B","size":14,"face":"Inter, sans-serif","bold":false,"strokeWidth":0,"strokeColor":"#ffffff"},"shape":"box","borderWidth":3,"value":1,"shadow":{"enabled":true,"color":"rgba(0,0,0,0.08)","size":8,"x":3,"y":3},"widthConstraint":{"minimum":110,"maximum":240},"x":286,"y":-300},{"id":"N_676","label":"教員支援と教育効果","title":"<div style=\"max-width: 300px; white-space: normal; overflow-wrap: break-word; font-size: 12px; color: rgb(51, 65
