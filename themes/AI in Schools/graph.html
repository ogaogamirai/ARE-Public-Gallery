ue":1,"shadow":{"enabled":true,"color":"rgba(0,0,0,0.08)","size":8,"x":3,"y":3},"widthConstraint":{"minimum":110,"maximum":240},"x":-2562,"y":675},{"id":"N_329","label":"書字・学習障害と教育","title":"<div style=\"max-width: 300px; white-space: normal; overflow-wrap: break-word; font-size: 12px; color: rgb(51, 65, 85);\">書字障害は書字表現を、学習障害は情報処理や表現を困難にする。既存の筆記中心の教育システムでは、これらの生徒の自己表現が阻害されやすい。</div>","level":9,"color":{"background":"#F8FAFC","border":"#475569","highlight":{"border":"#334155","background":"#F1F5F9"}},"font":{"color":"#1E293B","size":14,"face":"Inter, sans-serif","bold":false,"strokeWidth":0,"strokeColor":"#ffffff"},"shape":"box","borderWidth":3,"value":1,"shadow":{"enabled":true,"color":"rgba(0,0,0,0.08)","size":8,"x":3,"y":3},"widthConstraint":{"minimum":110,"maximum":240},"x":-3095,"y":375},{"id":"N_330","label":"AI教育の公平性","title":"<div style=\"max-width: 300px; white-space: normal; overflow-wrap: break-word; font-size: 12px; color: rgb(51, 65, 85);\">AIは個別最適化された学習機会を24時間提供可能だが、高品質なサービスや必要なデバイス・インターネット環境には費用がかかる場合が多く、経済力による格差が存在する。</div>","level":4,"color":{"background":"#F8FAFC","border":"#475569","highlight":{"border":"#334155","background":"#F1F5F9"}},"font":{"color":"#1E293B","size":14,"face":"Inter, sans-serif","bold":false,"strokeWidth":0,"strokeColor":"#ffffff"},"shape":"box","borderWidth":3,"value":1,"shadow":{"enabled":true,"color":"rgba(0,0,0,0.08)","size":8,"x":3,"y":3},"widthConstraint":{"minimum":110,"maximum":240},"x":107,"y":-375},{"id":"N_331","label":"AI依存と思考力低下","title":"<div style=\"max-width: 300px; white-space: normal; overflow-wrap: break-word; font-size: 12px; color: rgb(51, 65, 85);\">AIに課題を代行させると、思考プロセスが省略され、問題解決能力や批判的思考の発達が阻害される懸念が教育専門家から指摘されている。</div>","level":4,"color":{"background":"#F8FAFC","border":"#475569","highlight":{"border":"#334155","background":"#F1F5F9"}},"font":{"color":"#1E293B","size":14,"face":"Inter, sans-serif","bold":false,"strokeWidth":0,"strokeColor":"#ffffff"},"shape":"box","borderWidth":3,"value":1,"shadow":{"enabled":true,"color":"rgba(0,0,0,0.08)","size":8,"x":3,"y":3},"widthConstraint":{"minimum":110,"maximum":240},"x":285,"y":-375},{"id":"N_332","label":"AI誤情報と学生","title":"<div style=\"max-width: 300px; white-space: normal; overflow-wrap: break-word; font-size: 12px; color: rgb(51, 65, 85);\">学生がAIのハルシネーションを事実と誤認する事例は多く、情報安全性の低下を招く。これは社会の規範意識や秩序を揺るがすリスクとして認識されている。</div>","level":5,"color":{"background":"#F8FAFC","border":"#475569","highlight":{"border":"#334155","background":"#F1F5F9"}},"font":{"color":"#1E293B","size":14,"face":"Inter, sans-serif","bold":false,"strokeWidth":0,"strokeColor":"#ffffff"},"shape":"box","borderWidth":3,"value":1,"shadow":{"enabled":true,"color":"rgba(0,0,0,0.08)","size":8,"x":3,"y":3},"widthConstraint":{"minimum":110,"maximum":240},"x":-479,"y":-225},{"id":"N_333","label":"AIと教育格差","title":"<div style=\"max-width: 300px; white-space: normal; overflow-wrap: break-word; font-size: 12px; color: rgb(51, 65, 85);\">AIは個別最適化学習を提供し得るが、デジタルデバイドや高コストが新たな格差を生む可能性があり、経済力による教育格差を是正するとは限らない。</div>","level":7,"color":{"background":"#F8FAFC","border":"#E11D48","highlight":{"border":"#BE123C","background":"#F1F5F9"}},"font":{"color":"#1E293B","size":14,"face":"Inter, sans-serif","bold":false,"strokeWidth":0,"strokeColor":"#ffffff"},"shape":"box","borderWidth":5,"value":1,"shadow":{"enabled":true,"color":"rgba(225, 29, 72, 0.6)","size":30,"x":0,"y":0},"widthConstraint":{"minimum":110,"maximum":240},"x":-1683,"y":75},{"id":"N_334","label":"AIと格差拡大リスク","title":"<div style=\"max-width: 300px; white-space: normal; overflow-wrap: break-word; font-size: 12px; color: rgb(51, 65, 85);\">AIは個別最適化学習の可能性を持つが、高価なツールやデジタルインフラの格差により、経済力による教育格差をむしろ拡大させるリスクが多くの研究で指摘されている。</div>","level":8,"color":{"background":"#F8FAFC","border":"#475569","highlight":{"border":"#334155","background":"#F1F5F9"}},"font":{"color":"#1E293B","size":14,"face":"Inter, sans-serif","bold":false,"strokeWidth":0,"strokeColor":"#ffffff"},"shape":"box","borderWidth":3,"value":1,"shadow":{"enabled":true,"color":"rgba(0,0,0,0.08)","size":8,"x":3,"y":3},"widthConstraint":{"minimum":110,"maximum":240},"x":-1561,"y":225},{"id":"N_337","label":"AIと子供の思考力への影響","title":"<div style=\"max-width: 300px; white-space: normal; overflow-wrap: break-word; font-size: 12px; color: rgb(51, 65, 85);\">AIへの過度な依存は、子供の批判的思考力、問題解決能力、創造的表現の発達を阻害するリスクがある。専門家は、AIが思考を代行することで自己学習機会が失われ、人間としての尊厳や自己決定権の根幹が揺らぐ可能性を指摘し、警鐘を鳴らしている。</div>","level":9,"color":{"background":"#F8FAFC","border":"#E11D48","highlight":{"border":"#BE123C","background":"#F1F5F9"}},"font":{"color":"#1E293B","size":14,"face":"Inter, sans-serif","bold":false,"strokeWidth":0,"strokeColor":"#ffffff"},"shape":"box","borderWidth":5,"value":1,"shadow":{"enabled":true,"color":"rgba(225, 29, 72, 0.6)","size":30,"x":0,"y":0},"widthConstraint":{"minimum":110,"maximum":240},"x":-2909,"y":375},{"id":"N_338","label":"AIで教員負担軽減","title":"<div style=\"max-width: 300px; white-space: normal; overflow-wrap: break-word; font-size: 12px; color: rgb(51, 65, 85);\">AIは事務作業や教材作成を自動化し、教員の負担を軽減する可能性が指摘されている。これにより、教員は生徒の個別ケアや対話に時間を割き、教育の質向上に貢献すると期待されている。</div>","level":5,"color":{"background":"#F8FAFC","border":"#475569","highlight":{"border":"#334155","background":"#F1F5F9"}},"font":{"color":"#1E293B","size":14,"face":"Inter, sans-serif","bold":false,"strokeWidth":0,"strokeColor":"#ffffff"},"shape":"box","borderWidth":3,"value":1,"shadow":{"enabled":true,"color":"rgba(0,0,0,0.08)","size":8,"x":3,"y":3},"widthConstraint":{"minimum":110,"maximum":240},"x":-311,"y":-225},{"id":"N_339","label":"AI思考代行の懸念","title":"<div style=\"max-width: 300px; white-space: normal; overflow-wrap: break-word; font-size: 12px; color: rgb(51, 65, 85);\">AIによる思考プロセスの代行は、子供の批判的思考力や創造性の発達を阻害し、自己決定能力の低下を通じて個人の尊厳を損なうリスクがあるとの専門家の指摘が多い。</div>","level":9,"color":{"background":"#F8FAFC","border":"#475569","highlight":{"border":"#334155","background":"#F1F5F9"}},"font":{"color":"#1E293B","size":14,"face":"Inter, sans-serif","bold":false,"strokeWidth":0,"strokeColor":"#ffffff"},"shape":"box","borderWidth":3,"value":1,"shadow":{"enabled":true,"color":"rgba(0,0,0,0.08)","size":8,"x":3,"y":3},"widthConstraint":{"minimum":110,"maximum":240},"x":-2723,"y":375},{"id":"N_340","label":"AIと自己決定権の維持","title":"<div style=\"max-width: 300px; white-space: normal; overflow-wrap: break-word; font-size: 12px; color: rgb(51, 65, 85);\">AIによる思考・表現の代行は、子供の主体性や自己決定能力の発達を阻害し、人間の尊厳の根幹を揺るがす恐れがある。自己決定権の重視は、この代行から守る必要性を強調する。</div>","level":9,"color":{"background":"#F8FAFC","border":"#475569","highlight":{"border":"#334155","background":"#F1F5F9"}},"font":{"color":"#1E293B","size":14,"face":"Inter, sans-serif","bold":false,"strokeWidth":0,"strokeColor":"#ffffff"},"shape":"box","borderWidth":3,"value":1,"shadow":{"enabled":true,"color":"rgba(0,0,0,0.08)","size":8,"x":3,"y":3},"widthConstraint":{"minimum":110,"maximum":240},"x":-2530,"y":375},{"id":"N_341","label":"AIと共感力","title":"<div style=\"max-width: 300px; white-space: normal; overflow-wrap: break-word; font-size: 12px; color: rgb(51, 65, 85);\">AIとの過度な対話は、人間関係の摩擦や合意形成から学ぶ機会を減らし、共感力や社会性の発達を阻害する可能性が、複数の研究や専門家によって指摘されている。</div>","level":6,"color":{"background":"#F8FAFC","border":"#475569","highlight":{"border":"#334155","background":"#F1F5F9"}},"font":{"color":"#1E293B","size":14,"face":"Inter, sans-serif","bold":false,"strokeWidth":0,"strokeColor":"#ffffff"},"shape":"box","borderWidth":3,"value":1,"shadow":{"enabled":true,"color":"rgba(0,0,0,0.08)","size":8,"x":3,"y":3},"widthConstraint":{"minimum":110,"maximum":240},"x":-773,"y":-75},{"id":"N_342","label":"AI協働スキル必須性","title":"<div style=\"max-width: 300px; white-space: normal; overflow-wrap: break-word; font-size: 12px; color: rgb(51, 65, 85);\">世界経済フォーラム等の報告は、AIとの協働スキルが将来の労働市場で競争力を維持し、生産性を向上させるために不可欠であると強調している。</div>","level":7,"color":{"background":"#F8FAFC","border":"#475569","highlight":{"border":"#334155","background":"#F1F5F9"}},"font":{"color":"#1E293B","size":14,"face":"Inter, sans-serif","bold":false,"strokeWidth":0,"strokeColor":"#ffffff"},"shape":"box","bord
