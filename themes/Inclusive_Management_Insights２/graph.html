":0},"widthConstraint":{"minimum":110,"maximum":240},"x":-174,"y":75},{"id":"V_PROG","label":"進歩/革新","title":"<div style=\"max-width: 300px; white-space: normal; overflow-wrap: break-word; font-size: 12px; color: rgb(51, 65, 85);\">進歩/革新の追求</div>","level":7,"color":{"background":"#FEF3C7","border":"#B45309","highlight":{"border":"#92400E","background":"#FDE68A"}},"font":{"color":"#1E293B","size":18,"face":"Inter, sans-serif","bold":true,"strokeWidth":0,"strokeColor":"#ffffff"},"shape":"ellipse","borderWidth":2,"value":1,"shadow":{"enabled":true,"color":"rgba(0,0,0,0.08)","size":8,"x":3,"y":3},"widthConstraint":{"minimum":110,"maximum":240},"x":-1333,"y":375},{"id":"V_IDEN","label":"独自性/個","title":"<div style=\"max-width: 300px; white-space: normal; overflow-wrap: break-word; font-size: 12px; color: rgb(51, 65, 85);\">独自性/個の追求</div>","level":7,"color":{"background":"#FEF3C7","border":"#E11D48","highlight":{"border":"#BE123C","background":"#FDE68A"}},"font":{"color":"#1E293B","size":18,"face":"Inter, sans-serif","bold":true,"strokeWidth":0,"strokeColor":"#ffffff"},"shape":"ellipse","borderWidth":4,"value":1,"shadow":{"enabled":true,"color":"rgba(225, 29, 72, 0.45)","size":25,"x":0,"y":0},"widthConstraint":{"minimum":110,"maximum":240},"x":-1138,"y":375},{"id":"V_HOPE","label":"希望/可能性","title":"<div style=\"max-width: 300px; white-space: normal; overflow-wrap: break-word; font-size: 12px; color: rgb(51, 65, 85);\">希望/可能性の追求</div>","level":6,"color":{"background":"#FEF3C7","border":"#B45309","highlight":{"border":"#92400E","background":"#FDE68A"}},"font":{"color":"#1E293B","size":18,"face":"Inter, sans-serif","bold":true,"strokeWidth":0,"strokeColor":"#ffffff"},"shape":"ellipse","borderWidth":2,"value":1,"shadow":{"enabled":true,"color":"rgba(0,0,0,0.08)","size":8,"x":3,"y":3},"widthConstraint":{"minimum":110,"maximum":240},"x":-280,"y":225},{"id":"V_DIGN","label":"尊厳/誇り","title":"<div style=\"max-width: 300px; white-space: normal; overflow-wrap: break-word; font-size: 12px; color: rgb(51, 65, 85);\">尊厳/誇りの追求</div>","level":7,"color":{"background":"#FEF3C7","border":"#E11D48","highlight":{"border":"#BE123C","background":"#FDE68A"}},"font":{"color":"#1E293B","size":18,"face":"Inter, sans-serif","bold":true,"strokeWidth":0,"strokeColor":"#ffffff"},"shape":"ellipse","borderWidth":4,"value":1,"shadow":{"enabled":true,"color":"rgba(225, 29, 72, 0.45)","size":25,"x":0,"y":0},"widthConstraint":{"minimum":110,"maximum":240},"x":-943,"y":375},{"id":"N_FC_1","label":"メンタル不調と発達障害特性によ\nる生産性低下およびメンタルヘル\nス悪化","title":"<div style=\"max-width: 300px; white-space: normal; overflow-wrap: break-word; font-size: 12px; color: rgb(51, 65, 85);\">2025年の横浜市立大学大学院と産業医科大学の共同研究によると、働く人が「気分が沈む」「眠れない」といった心身の不調を抱えながら仕事を続けることで、日本全体で年間およそ7.6兆円の経済的な損失が生じており、これは日本のGDPの1.1%に相当します。また、2025年のSanpo Naviの報告では、ADHD/ASDなどの発達障害の特性により、職場環境への不適応や業務遂行の困難からストレスを抱え、意欲低下、体調不良、遅刻・欠勤の増加につながり、さらにはうつ病や不安障害などの二次障害や精神疾患の悪化につながる可能性が指摘されています。2025年のCareNetの縦断研究では、自閉症スペクトラム特性および注意欠如・多動性障害（ADHD）特性が高く努力制御が低い生徒は、小中学校移行期においてメンタルヘルスの問題がより深刻になることが示されています。</div>","level":4,"color":{"background":"#F8FAFC","border":"#475569","highlight":{"border":"#334155","background":"#F1F5F9"}},"font":{"color":"#1E293B","size":14,"face":"Inter, sans-serif","bold":false,"strokeWidth":0,"strokeColor":"#ffffff"},"shape":"box","borderWidth":3,"value":1,"shadow":{"enabled":true,"color":"rgba(0,0,0,0.08)","size":8,"x":3,"y":3},"widthConstraint":{"minimum":110,"maximum":240},"x":-78,"y":-75},{"id":"N_FC_2","label":"心理的安全性とメンタルヘルス不\n調が従業員のパフォーマンス低下\nおよび離職率に与える影響","title":"<div style=\"max-width: 300px; white-space: normal; overflow-wrap: break-word; font-size: 12px; color: rgb(51, 65, 85);\">2025年のGallupの調査データによると、職場で自分の意見が尊重されていると強く感じている社員の割合を30%から60%に引き上げることができれば、離職率が27%減少し、生産性が12%向上する可能性があると試算されています。また、Googleの「プロジェクト・アリストテレス」では、チームの成功を左右する最大の要因が「心理的安全性」であり、心理的安全性が高いチームほど離職率が低く、高い業績を上げることが判明しています。さらに、2024年のパーソル総合研究所の調査では、過去3年以内に治療なしでは日常生活が困難なほどのメンタルヘルス不調を経験した正規雇用者のうち、25.3%が勤務先を退職していると報告されており、メンタルヘルス不調が離職に直結する事実が示されています。</div>","level":4,"color":{"background":"#F8FAFC","border":"#475569","highlight":{"border":"#334155","background":"#F1F5F9"}},"font":{"color":"#1E293B","size":14,"face":"Inter, sans-serif","bold":false,"strokeWidth":0,"strokeColor":"#ffffff"},"shape":"box","borderWidth":3,"value":1,"shadow":{"enabled":true,"color":"rgba(0,0,0,0.08)","size":8,"x":3,"y":3},"widthConstraint":{"minimum":110,"maximum":240},"x":102,"y":-75},{"id":"N_FC_3","label":"職場での見えない障害の自己開示\nに伴う不利益への懸念","title":"<div style=\"max-width: 300px; white-space: normal; overflow-wrap: break-word; font-size: 12px; color: rgb(51, 65, 85);\">2021年から2026年にかけての就労支援機関や専門家による情報によると、発達障害や精神疾患などの見えない障害を持つ従業員は、職場での自己開示に関して、偏見や差別を受けるリスク、昇進・昇給の機会の減少、給与・待遇の低下、プライバシー侵害の懸念、特別扱いされることへの抵抗、そして自身の障害が正しく理解されないことによる心理的負担などの不利益を強く懸念している。</div>","level":4,"color":{"background":"#F8FAFC","border":"#475569","highlight":{"border":"#334155","background":"#F1F5F9"}},"font":{"color":"#1E293B","size":14,"face":"Inter, sans-serif","bold":false,"strokeWidth":0,"strokeColor":"#ffffff"},"shape":"box","borderWidth":3,"value":1,"shadow":{"enabled":true,"color":"rgba(0,0,0,0.08)","size":8,"x":3,"y":3},"widthConstraint":{"minimum":110,"maximum":240},"x":277,"y":-75},{"id":"N_FC_4","label":"職場における自己開示の困難と合\n理的配慮への影響","title":"<div style=\"max-width: 300px; white-space: normal; overflow-wrap: break-word; font-size: 12px; color: rgb(51, 65, 85);\">2025年のパーソル総合研究所の調査によると、20代若手社員の約7割がメンタルヘルス不調を職場に相談することに抵抗を感じており、その背景には「相談したら自身の評価・評判が下がる」という懸念がある。また、2023年のワークリアの調査では、精神・発達障がい者の半数以上が障がいを開示せずに就業経験があり、オープン就労へのネガティブなイメージや不利益な影響が指摘されている。これらの自己開示の困難は、必要な合理的配慮の提供を妨げる要因となる。例えば、2018年の研究では、精神障害者の「障害の非開示による不安」が、相談できず支援もないために職場定着を困難にすることが示されている。厚生労働省も、障害のある方が自身の特性や希望する配慮を事業主等に伝えやすくするための情報共有ツール「就労パスポート」を作成しており、自己理解と情報伝達の重要性を強調している。</div>","level":4,"color":{"background":"#F8FAFC","border":"#475569","highlight":{"border":"#334155","background":"#F1F5F9"}},"font":{"color":"#1E293B","size":14,"face":"Inter, sans-serif","bold":false,"strokeWidth":0,"strokeColor":"#ffffff"},"shape":"box","borderWidth":3,"value":1,"shadow":{"enabled":true,"color":"rgba(0,0,0,0.08)","size":8,"x":3,"y":3},"widthConstraint":{"minimum":110,"maximum":240},"x":451,"y":-75},{"id":"N_FC_5","label":"心理的安全性の低さが見えない障\n害者の困難と離職率を増大させる","title":"<div style=\"max-width: 300px; white-space: normal; overflow-wrap: break-word; font-size: 12px; color: rgb(51, 65, 85);\">2025年の障害者職業総合センターの調査研究によると、精神障害のある方の就職後1年時点の定着率は49.3%と低く、約半数が1年以内に離職している状況です。2025年および2026年の複数の調査・研究によると、心理的安全性が低い職場では、従業員が「無知だと思われる不安」「無能だと思われる不安」「邪魔をしていると思われる不安」「ネガティブだと思われる不安」といった4つの不安を抱え、質問や意見表明を控える傾向があります。これは特に、発達障害や精神障害といった見えない障害を持つ従業員が、自身の特性や必要な合理的配慮について開示し、支援を求める上での困難を増大させます。心理的安全性の低い環境は、従業員のモチベーション低下、パフォーマンスの悪化、問題への対応遅延、メンタルヘルス不調の増加、ひいては離職率の上昇につながると指摘されています。精神疾患からの復職者にとっては、再発防止のためにも心理的安全性の高い職場環境が不可欠です。</div>","level":4,"color":{"background":"#F8FAFC","border":"#475569","highlight":{"border":"#334155","background":"#F1F5F9"}},"font":{"color":"#1E293B","size":14,"face":"Inter, sans-serif","bold":false,"strokeWidth":0,"strokeColor":"#ffffff"},"shape":"box","borderWidth":3,"value":1,"shadow":{"enabled":true,"color":"rgba(0,0,0,0.08)","size":8,"x":3,"y":3},"widthConstraint":{"minimum":110,"maximum":240},"x":623,"y":-75},{"id":"N_FC_6","label":"中間管理職は上司からの目標達成\n圧力と上司・部下間の板挟みによ\nる負担が大きい","title":"<div style=\"max-width: 300px; white-space: normal; overflow-wrap: break-word; font-size: 12px; color: rgb(51, 65, 85);\">2019年のマンパワーグループの調査によると、中間管理職が勤務先で感じるストレスの原因の1位は「上司との関係」（47.0％）であり、上司から結果や評価に対するプレッシャーを感じるケースが多数報告されている。 また、2021年6月～7月に実施された中間管理職経験者238名を対象としたアンケート調査では、「中間管理職がつらいと感じる瞬間」のダントツ1位が「上司と部下の間で板挟みになるとき」（121人）であった。 さらに、2024年11月の株式会社スタメンの調査では、中間管理職の94.9%が他の役職と比較して負担が大きいと感じており、負担要因として「上司や経営層とのコミュニケーション」（11.1%）と「部下とのコミュニケーション」（10.1%）が挙げられ、経営層と現場の調整に負担がかかっていることが示されている。</div>","level":4,"color":{"background":"#F8FAFC","border":"#475569","highlight":{"border":"#334155","background":"#F1F5F9"}},"font":{"color":"#1E293B","size":14,"face":"Inter, sans-serif","bold":false,"strokeWidth":0,"strokeColor":"#ffffff"},"shape":"box","borderWidth":3,"value":1,"shadow":{"enabled":true,"color":"rgba(0,0,0,0.08)","size":8,"x":3,"y":3},"widthConstraint":{"minimum":110,"maximum":240},"x":793,"y":-75},{"id":"N_FC_7","label":"合理的配慮が企業にもたらす隠れ\nたコストと課題","title":"<div style=\"max-width: 300px; white-space: normal; overflow-wrap: break-word; font-size: 12px; color: rgb(51, 65, 85);\">2025年3月にパーソルダイバースが発表した「企業の障害者雇用における合理的配慮に関する調査」によると、合理的配慮の実施に対し、企業の54.9%が「課題が大きい」（「大変大きい」17.2%、「やや大きい」37.7%の合計）と回答しています。特に、合理的配慮の実施には経済的および人的コストの負担が伴い、管理職や同僚に対する追加の負担が発生する場合があります。2024年6月のパーソル総合研究所の調査では、精神障害者と働く上司・同僚の約4割が「精神的な負担が大きいと感じる」と回答しており、他の障害や障害以外の事情がある部下・同僚と比べ、受け入れの負担を感じる割合が高いことが示されています。また、合理的配慮が「特別扱い」と誤解されることや、障害に対する無理解が生産性や職場環境に悪影響を及ぼし、他の従業員との間で不公平感が生じる可能性も指摘されています。</div>","level":4,"color":{"background":"#F8FAFC","border":"#475569","highlight":{"border":"#334155","background":"#F1F5F9"}},"font":{"color":"#1E293B","size":14,"face":"Inter, sans-serif","bold":false,"strokeWidth":0,"strokeColor":"#ffffff"},"shape":"box","borderWidth":3,"value":1,"shadow":{"enabled":true,"color":"rgba(0,0,0,0.08)","size":8,"x":3,"y":3},"widthConstraint":{"minimum":110,"maximum":240},"x":965,"y":-75},{"id":"N_FC_8","label":"中間管理職の部下育成責任と負担\n感の増大","title":"<div style=\"max-width: 300px; white-space: normal; overflow-wrap: break-word; font-size: 12px; color: rgb(51, 65, 85);\">2024年12月の株式会社スタメンの調査によると、中間管理職の94.9%が他の役職と比較して自身の負担が大きいと感じており、その要因として「部下の業務のフォロー」が14.6%で最も多く挙げられています。また、2023年9月のリクルートマネジメントソリューションズの調査では、人事担当者と管理職層の双方で「ミドルマネジメント層の負担が過重になっている」が組織課題の1位（それぞれ65.3%、64.7%）と認識されています。中間管理職は、経営層の方針を現場に浸透させ、部下の業務支援・管理、育成を担う重要な役割を果たす一方で、プレイングマネージャーとしての自身の業務に加え、働き方改革の進展や部下の多様化（メンタルヘルス不調や発達障害傾向のある部下への対応を含む）により、育成に十分な時間を割けず、精神的・業務的な負担が増大していることが複数の調査や専門機関によって指摘されています。</div>","level":4,"color":{"background":"#F8FAFC","border":"#475569","highlight":{"border":"#334155","background":"#F1F5F9"}},"font":{"color":"#1E293B","size":14,"face":"Inter, sans-serif","bold":false,"strokeWidth":0,"strokeColor":"#ffffff"},"shape":"box","borderWidth":3,"value":1,"shadow":{"enabled":true,"color":"rgba(0,0,0,0.08)","size":8,"x":3,"y":3},"widthConstraint":{"minimum":110,"maximum":240},"x":1151,"y":-75},{"id":"N_FC_9","label":"中間管理職の業務量増加と多岐に\nわたる役割","title":"<div style=\"max-width: 300px; white-space: normal; overflow-wrap: break-word; font-size: 12px; color: rgb(51, 65, 85);\">2025年3月に株式会社EVeMが全国の管理職および中間管理職1,210名を対象に実施した「管理職の実態調査 2025」によると、管理職の64%が日々の業務量を「多い」または「非常に多い」と感じており、60%以上が以前より業務量が増えたと回答しています。 業務量が増加した背景としては、「人手不足」（58.1%）、「業務の種類が増えている」（48.6%）、「働き方に制約のあるメンバーの増加」（25.2%）が上位に挙げられています。 また、リクルートマネジメントソリューションズの2020年の調査では、ミドルマネージャーは「働き方改革、ダイバーシティ＆インクルージョン、コンプライアンス、イノベーションの創出、戦略推進と業績アップなど、現場で舵取りを担う施策は多岐にわたっており、『多重債務』状態ともいえる」と指摘されています。 Schooが2026年2月に公開した記事でも、中間管理職には目標設計・管理、チームマネジメント、人材育成・評価など多岐にわたるスキルが求められ、プレイヤー業務との兼務、世代間ギャップ、働き方の多様化への対応などが課題として挙げられています。</div>","level":4,"color":{"background":"#F8FAFC","border":"#475569","highlight":{"border":"#334155","background":"#F1F5F9"}},"font":{"color":"#1E293B","size":14,"face":"Inter, sans-serif","bold":false,"strokeWidth":0,"strokeColor":"#ffffff"},"shape":"box","borderWidth":3,"value":1,"shadow":{"enabled":true,"color":"rgba(0,0,0,0.08)","size":8,"x":3,"y":3},"widthConstraint":{"minimum":110,"maximum":240},"x":1344,"y":-75},{"id":"N_FC_10","label":"日本の職場におけるニューロダイ\nバーシティ認知度の低さ","title":"<div style=\"max-width: 300px; white-space: normal; overflow-wrap: break-word; font-size: 12px; color: rgb(51, 65, 85);\">2023年3月30日に日本橋ニューロダイバーシティプロジェクトが発表した「職場における脳・神経の多様性に関する意識調査」によると、全国のオフィスワーカー2600人を対象とした調査で、ニューロダイバーシティの認知度・理解度が最も低く、特に周囲の人々の60.5%が「知らない」と回答しました。この結果は、ニューロダイバーシティ人材が活躍できる土壌が整っているとは言えない状況を示唆しています。 また、2024年11月26日に日本総研が公開した情報では、「発達障害」という言葉の認知度は91.5%である一方で、その対応に関する知識を知っている人は26.5%に留まっていると報告されています。 さらに、就労移行支援manabyが2023年10月31日から11月14日に実施し、2025年2月19日に公開した発達障害者115名を対象としたアンケート調査では、約64.3%が自身の障害や特性を職場やチームに伝えておらず、その理由として「伝えても理解してくれないと思うから」という懸念が上位に挙げられています。 これらのデータは、日本の職場においてニューロダイバーシティの認知度および理解度が依然として低いことを客観的に示しています。</div>","level":4,"color":{"background":"#F8FAFC","border":"#475569","highlight":{"border":"#334155","background":"#F1F5F9"}},"font":{"color":"#1E293B","size":14,"face":"Inter, sans-serif","bold":false,"strokeWidth":0,"strokeColor":"#ffffff"},"shape":"box","borderWidth":3,"value":1,"shadow":{"enabled":true,"color":"rgba(0,0,0,0.08)","size":8,"x":3,"y":3},"widthConstraint":{"minimum":110,"maximum":240},"x":1749,"y":-75},{"id":"N_FC_11","label":"ADHD/ASD特性による職場\nでの困難","title":"<div style=\"max-width: 300px; white-space: normal; overflow-wrap: break-word; font-size: 12px; color: rgb(51, 65, 85);\">2025年から2026年にかけて公開された複数の情報サイトや専門機関の解説によると、ADHD（注意欠如・多動症）やASD（自閉スペクトラム症）の特性を持つ人は、職場において不注意、集中力の持続困難、ケアレスミス、忘れ物、遅刻、スケジュール管理の苦手さ、マルチタスクの困難、衝動的な言動、コミュニケーションの困難（非言語的合図の理解、場の空気を読む、一方的な会話）、曖昧な指示の理解困難、臨機応変な対応の苦手さ、強いこだわり、感覚過敏といった特性により、仕事のミスや職場不適応、人間関係の課題を抱えやすいとされています。また、2025年6月のレバレジーズ株式会社の調査では、7割の企業担当者が精神・発達障がい者の職場定着に課題を実感しており、その理由として指示の伝え方などのコミュニケーションの難しさを挙げています。</div>","level":4,"color":{"background":"#F8FAFC","border":"#475569","highlight":{"border":"#334155","background":"#F1F5F9"}},"font":{"color":"#1E293B","size":14,"face":"Inter, sans-serif","bold":false,"strokeWidth":0,"strokeColor":"#ffffff"},"shape":"box","borderWidth":3,"value":1,"shadow":{"enabled":true,"color":"rgba(0,0,0,0.08)","size":8,"x":3,"y":3},"widthConstraint":{"minimum":110,"maximum":240},"x":1948,"y":-75}];
