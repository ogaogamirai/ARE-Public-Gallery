8A"}},"font":{"color":"#1E293B","size":18,"face":"Inter, sans-serif","bold":true,"strokeWidth":0,"strokeColor":"#ffffff"},"shape":"ellipse","borderWidth":2,"value":1,"shadow":{"enabled":true,"color":"rgba(0,0,0,0.08)","size":8,"x":3,"y":3},"widthConstraint":{"minimum":110,"maximum":240},"x":-16,"y":300},{"id":"N_FC_1","label":"AIへの過度な依存による生徒の\n思考力・創造性・学習意欲の低下","title":"<div style=\"max-width: 300px; white-space: normal; overflow-wrap: break-word; font-size: 12px; color: rgb(51, 65, 85);\">2025年の情報処理国際連合の教育技術委員会が刊行する学術雑誌「Education and Information Technologies」に掲載された論文によると、ChatGPTのような生成AIの過度な利用は学生のモチベーションや成績に影響を与える可能性があると報告されている。また、2025年のMITメディアラボの研究では、AIを使用すると探索的な思考や創造性に関わる脳の活動が低下することが示された。さらに、2025年のインドネシアの25の高等教育機関の学部生245名を対象とした調査では、75%の学生がAI依存による批判的思考力の低下を認識しており、73%が技術への過度な依存リスクを、70%が誤情報や不正確性の問題を認識していることが明らかになった。2026年の文部科学省の資料でも、生成AIに頼りすぎることで自分で思考する機会が減り、思考力の低下につながる「認知的オフロード」や「認知負債」と呼ばれる現象が懸念の一つにあげられている。</div>","level":4,"color":{"background":"#F8FAFC","border":"#475569","highlight":{"border":"#334155","background":"#F1F5F9"}},"font":{"color":"#1E293B","size":14,"face":"Inter, sans-serif","bold":false,"strokeWidth":0,"strokeColor":"#ffffff"},"shape":"box","borderWidth":3,"value":1,"shadow":{"enabled":true,"color":"rgba(0,0,0,0.08)","size":8,"x":3,"y":3},"widthConstraint":{"minimum":110,"maximum":240},"x":386,"y":0},{"id":"N_FC_2","label":"AIによる個別最適化学習の実現\nと事例","title":"<div style=\"max-width: 300px; white-space: normal; overflow-wrap: break-word; font-size: 12px; color: rgb(51, 65, 85);\">2024年から2026年にかけての複数の教育技術企業、研究機関、メディアの報告によると、AIは学習履歴分析とコンテンツ提供を通じて個別最適化学習を可能にしている。例えば、アダプティブラーニングプラットフォームは、生徒の学習ペースや能力に合わせてレッスンを調整し、パーソナライズされたコンテンツを提供する。具体的には、ALEKSやKhan Academy、Duolingo、Qubena、atama+などのプラットフォームが、生徒の理解度、学習履歴、ミスのパターンを分析し、オーダーメイドのカリキュラムを自動生成している。これにより、学習効率の向上、エンゲージメントの強化、学業成績の改善、モチベーションの向上といった効果が報告されている。例えば、Qubenaの実証実験では、学習時間を約半分に短縮しながら成績・学習意欲が向上した事例がある。また、AIは教材作成や採点などの教員の業務負担を軽減し、より高度な指導に時間を充てることを可能にしている。</div>","level":4,"color":{"background":"#F8FAFC","border":"#475569","highlight":{"border":"#334155","background":"#F1F5F9"}},"font":{"color":"#1E293B","size":14,"face":"Inter, sans-serif","bold":false,"strokeWidth":0,"strokeColor":"#ffffff"},"shape":"box","borderWidth":3,"value":1,"shadow":{"enabled":true,"color":"rgba(0,0,0,0.08)","size":8,"x":3,"y":3},"widthConstraint":{"minimum":110,"maximum":240},"x":577,"y":0},{"id":"N_FC_3","label":"AIによる課題判別困難と教育評\n価の公平性への影響","title":"<div style=\"max-width: 300px; white-space: normal; overflow-wrap: break-word; font-size: 12px; color: rgb(51, 65, 85);\">2025年10月に発表された仙台大学AI教育研究チームの全国調査によると、教員の48.8%が「生成AIが書いたものか、学生が書いたものかの判断が難しい提出物の増加」を主要な問題として指摘している。また、2024年7月に英レディング大学で行われた実験では、AIが作成した解答が試験に混ぜられた場合、94%が検出されずに採点されたことが報告されており、AI生成物の判別困難が評価の公平性を損なう可能性が示されている。文部科学省も2024年12月26日公開の「初等中等教育段階における生成AIの利活用に関するガイドラインVer. 2.0」において、生成AIの出力をそのまま自己の成果物として応募・提出することは評価基準や応募規約によっては不適切又は不正な行為に当たることについて十分に指導するよう求めており、AIによる課題の判別困難が教育評価の公平性を保てなくなるという認識が教育現場で広く共有されている。</div>","level":4,"color":{"background":"#F8FAFC","border":"#475569","highlight":{"border":"#334155","background":"#F1F5F9"}},"font":{"color":"#1E293B","size":14,"face":"Inter, sans-serif","bold":false,"strokeWidth":0,"strokeColor":"#ffffff"},"shape":"box","borderWidth":3,"value":1,"shadow":{"enabled":true,"color":"rgba(0,0,0,0.08)","size":8,"x":3,"y":3},"widthConstraint":{"minimum":110,"maximum":240},"x":993,"y":0}];
