itle":"<div style=\"max-width: 300px; white-space: normal; overflow-wrap: break-word; font-size: 12px; color: rgb(71, 85, 105);\">正義/規範の追求</div>","level":7,"color":{"background":"#eff6ff","border":"#3b82f6"},"font":{"color":"#581c87","size":14},"shape":"ellipse","borderWidth":3,"value":1,"shadow":{"enabled":true,"color":"rgba(59, 130, 246, 0.4)","size":15},"widthConstraint":{"minimum":100,"maximum":220},"x":-823,"y":375},{"id":"V_HOPE","label":"希望/可能性","title":"<div style=\"max-width: 300px; white-space: normal; overflow-wrap: break-word; font-size: 12px; color: rgb(71, 85, 105);\">希望/可能性の追求</div>","level":6,"color":{"background":"#eff6ff","border":"#a855f7"},"font":{"color":"#581c87","size":14},"shape":"ellipse","borderWidth":1,"value":1,"shadow":false,"widthConstraint":{"minimum":100,"maximum":220},"x":-116,"y":225},{"id":"V_DIGN","label":"尊厳/誇り","title":"<div style=\"max-width: 300px; white-space: normal; overflow-wrap: break-word; font-size: 12px; color: rgb(71, 85, 105);\">尊厳/誇りの追求</div>","level":7,"color":{"background":"#eff6ff","border":"#a855f7"},"font":{"color":"#581c87","size":14},"shape":"ellipse","borderWidth":1,"value":1,"shadow":false,"widthConstraint":{"minimum":100,"maximum":220},"x":-636,"y":375},{"id":"N_102","label":"脆弱性対策優先","title":"<div style=\"max-width: 300px; white-space: normal; overflow-wrap: break-word; font-size: 12px; color: rgb(71, 85, 105);\">AI技術の恩恵を享受し、真に持続可能で恩恵をもたらすAI社会を築くためには、我々（社会全体）は、計り知れない混乱と損害を回避し、社会の安定と持続可能性を確保するために、AI技術が抱える雇用の喪失、倫理的問題、誤作動リスク、技術格差、透明性の欠如といった根源的な脆弱性に対する明確な回答と具体的な対策を徹底的に議論し、講じるべきである。</div>","level":2,"color":{"background":"#e0f2fe","border":"#fca5a5"},"font":{"color":"#0c4a6e","size":14},"shape":"box","borderWidth":1,"value":1,"shadow":false,"widthConstraint":{"minimum":100,"maximum":220},"x":-472,"y":-375},{"id":"N_103","label":"慎重なAI導入","title":"<div style=\"max-width: 300px; white-space: normal; overflow-wrap: break-word; font-size: 12px; color: rgb(71, 85, 105);\">AI技術を社会に導入する際には、我々（社会全体）は、未来の社会に対する無責任な賭けを避け、計り知れない混乱と損害を回避するために、そのリスクを十分に理解し、制御可能な範囲で、慎重に進めるべきであり、脆弱性への議論なく導入の加速を語るべきではない。</div>","level":2,"color":{"background":"#e0f2fe","border":"#fca5a5"},"font":{"color":"#0c4a6e","size":14},"shape":"box","borderWidth":1,"value":1,"shadow":false,"widthConstraint":{"minimum":100,"maximum":220},"x":-71,"y":-375},{"id":"N_104","label":"使用済み核燃料の最終処分地は未\n...","title":"<div style=\"max-width: 300px; white-space: normal; overflow-wrap: break-word; font-size: 12px; color: rgb(71, 85, 105);\">使用済み核燃料の最終処分地は未定という事実。</div>","level":3,"color":{"background":"#dcfce7","border":"#fca5a5"},"font":{"color":"#14532d","size":14},"shape":"box","borderWidth":2,"value":1,"shadow":false,"widthConstraint":{"minimum":100,"maximum":220},"x":11,"y":-225},{"id":"N_106","label":"将来への懸念という感情","title":"<div style=\"max-width: 300px; white-space: normal; overflow-wrap: break-word; font-size: 12px; color: rgb(71, 85, 105);\">将来への懸念という感情。</div>","level":3,"color":{"background":"#f1f5f9","border":"#fca5a5"},"font":{"color":"#475569","size":14},"shape":"box","borderWidth":1,"value":1,"shadow":false,"widthConstraint":{"minimum":100,"maximum":220},"x":134,"y":-225},{"id":"N_107","label":"AIによる雇用喪失は社会構造を\n...","title":"<div style=\"max-width: 300px; white-space: normal; overflow-wrap: break-word; font-size: 12px; color: rgb(71, 85, 105);\">AIによる雇用喪失は社会構造を揺るがす変革という事実。</div>","level":3,"color":{"background":"#dcfce7","border":"#fca5a5"},"font":{"color":"#14532d","size":14},"shape":"box","borderWidth":2,"value":1,"shadow":false,"widthConstraint":{"minimum":100,"maximum":220},"x":255,"y":-225},{"id":"N_109","label":"計り知れない混乱と損害への危機\n...","title":"<div style=\"max-width: 300px; white-space: normal; overflow-wrap: break-word; font-size: 12px; color: rgb(71, 85, 105);\">計り知れない混乱と損害への危機感という感情。</div>","level":3,"color":{"background":"#f1f5f9","border":"#fca5a5"},"font":{"color":"#475569","size":14},"shape":"box","borderWidth":1,"value":1,"shadow":false,"widthConstraint":{"minimum":100,"maximum":220},"x":389,"y":-225} :1,"shadow":false,"widthConstraint":{"minimum":100,"maximum":220},"x":-634,"y":75},{"id":"N_120","label":"社会全体の幸福","title":"<div style=\"max-width: 300px; white-space: normal; overflow-wrap: break-word; font-size: 12px; color: rgb(71, 85, 105);\">社会全体の幸福の重視。</div>","level":5,"color":{"background":"#f3e8ff","border":"#fca5a5"},"font":{"color":"#581c87","size":14},"shape":"box","borderWidth":1,"value":1,"shadow":false,"widthConstraint":{"minimum":100,"maximum":220},"x":-436,"y":75},{"id":"N_121","label":"社会全体の安寧","title":"<div style=\"max-width: 300px; white-space: normal; overflow-wrap: break-word; font-size: 12px; color: rgb(71, 85, 105);\">社会全体の安寧の重視。</div>","level":5,"color":{"background":"#f3e8ff","border":"#fca5a5"},"font":{"color":"#581c87","size":14},"shape":"box","borderWidth":1,"value":1,"shadow":false,"widthConstraint":{"minimum":100,"maximum":220},"x":-237,"y":75},{"id":"V_TRST","label":"信頼/信用","title":"<div style=\"max-width: 300px; white-space: normal; overflow-wrap: break-word; font-size: 12px; color: rgb(71, 85, 105);\">信頼/信用の追求</div>","level":3,"color":{"background":"#eff6ff","border":"#a855f7"},"font":{"color":"#581c87","size":14},"shape":"ellipse","borderWidth":1,"value":1,"shadow":false,"widthConstraint":{"minimum":100,"maximum":220},"x":894,"y":-225},{"id":"V_PROG","label":"進歩/革新","title":"<div style=\"max-width: 300px; white-space: normal; overflow-wrap: break-word; font-size: 12px; color: rgb(71, 85, 105);\">進歩/革新の追求</div>","level":3,"color":{"background":"#eff6ff","border":"#a855f7"},"font":{"color":"#581c87","size":14},"shape":"ellipse","borderWidth":1,"value":1,"shadow":false,"widthConstraint":{"minimum":100,"maximum":220},"x":1093,"y":-225},{"id":"V_LOVE","label":"連帯/絆","title":"<div style=\"max-width: 300px; white-space: normal; overflow-wrap: break-word; font-size: 12px; color: rgb(71, 85, 105);\">連帯/絆の追求</div>","level":7,"color":{"background":"#eff6ff","border":"#a855f7"},"font":{"color":"#581c87","size":14},"shape":"ellipse","borderWidth":1,"value":1,"shadow":false,"widthConstraint":{"minimum":100,"maximum":220},"x":-439,"y":375},{"id":"N_FC_1","label":"原発再稼働による燃料費削減効果","title":"<div style=\"max-width: 300px; white-space: normal; overflow-wrap: break-word; font-size: 12px; color: rgb(71, 85, 105);\">2025年11月27日の報道によると、北海道電力は泊原子力発電所の再稼働により家庭用電気料金を約11%値下げできると発表しています。また、東京電力は柏崎刈羽原子力発電所の再稼働により年間約1,000億円の燃料費削減効果を見込んでおり、2023年の料金改定では再稼働を前提に値上げ幅を圧縮しています。2023年に新設・運転した場合の発電コスト試算では、原子力発電が12.6円/kWhであるのに対し、LNG火力は19.1円/kWh、石炭火力は24.8円/kWhと、原子力発電が安価であることが示されています。さらに、2024年12月25日のキヤノングローバル戦略研究所の分析では、2040年の既存原子力発電の燃料費は1.9円/kWhと、既存の石炭火力（4.2円/kWh）やLNG火力（6.0円/kWh）と比較して大幅に低いとされています。原子力発電の停止後、火力発電への依存が増加したことで、2010年度比で15.5兆円の燃料費が増加し、国民一人当たり約12万円の負担増になったとのデータもあります。</div>","level":4,"color":{"background":"#dcfce7","border":"#3b82f6"},"font":{"color":"#14532d","size":14},"shape":"box","borderWidth":2,"value":1,"shadow":false,"widthConstraint":{"minimum":100,"maximum":220},"x":-25,"y":-75},{"id":"N_FC_2","label":"新規制基準適合性審査合格原発の\n再稼働状況","title":"<div style=\"max-width: 300px; white-space: normal; overflow-wrap: break-word; font-size: 12px; color: rgb(71, 85, 105);\">2025年8月5日時点の電気事業連合会および自然エネルギー財団のデータによると、日本において新規制基準適合性審査に合格した原子力発電所のうち、14基が再稼働している。これは、新規制基準適合性審査を通過した原発の再稼働が進んでいることを示している。再稼働には原子力規制委員会による審査合格に加え、地元自治体の理解・同意も必要とされている。複数の原発が現在も審査中であり、一部では安全対策工事の遅延やデータ不正操作（例：浜岡原発）により再稼働が遅れるケースも確認されている。</div>","level":4,"color":{"background":"#dcfce7","border":"#3b82f6"},"font":{"color":"#14532d","size":14},"shape":"box","borderWidth":2,"value":1,"shadow":false,"widthConstraint":{"minimum":100,"maximum":220},"x":126,"y":-75},{"id":"N_FC_3","label":"原子力発電所の再稼働は電力の安\n定供給に貢献するベースロード電\n源","title":"<div style=\"max-width: 300px; white-space: normal; overflow-wrap: break-word; font-size: 12px; color: rgb(71, 85, 105);\">2025年2月に閣議決定された第7次エネルギー基本計画によると、原子力発電は「優れた安定供給性、技術自給率を有し、他電源とそん色ないコスト水準で変動も少なく、一定の出力で安定的に発電可能」であり、エネルギー需給構造の安定性に寄与する重要なベースロード電源として位置づけられています。2023年度の日本の電源構成は火力発電が約68.6%を占めており、海外からの化石燃料依存度が高い日本のエネルギー安全保障を強化し、電力需給ひっ迫のリスクを低減するために、安全性が確認された原子力発電所の再稼働が推進されています。特に、データセンターや半導体工場の新増設により2020年代後半にかけて電力需要が増加する見通しの中で、原子力発電は天候に左右されずに安定した電力を供給できる特性を持つとされています。</div>","level":4,"color":{"background":"#dcfce7","border":"#3b82f6"},"font":{"color":"#14532d","size":14},"shape":"box","borderWidth":2,"value":1,"shadow":false,"widthConstraint":{"minimum":100,"maximum":220},"x":288,"y":-75},{"id":"N_FC_4","label":"日本の再生可能エネルギー導入進\n展と安定供給・コスト課題","title":"<div style=\"max-width: 300px; white-space: normal; overflow-wrap: break-word; font-size: 12px; color: rgb(71, 85, 105);\">2024年（暦年）の環境エネルギー政策研究所の速報値によると、日本国内の全発電電力量に占める自然エネルギーの割合は26.7%に達し、2016年の約15%から増加傾向にある。特に太陽光発電は2023年度に9.8%を占め、2013年度の1.2%から大幅に増加した。政府は2030年度までに再生可能エネルギーの比率を36～38%とする目標を掲げている。</div>","level":4,"color":{"background":"#dcfce7","border":"#3b82f6"},"font":{"color":"#14532d","size":14},"shape":"box","borderWidth":2,"value":1,"shadow":false,"widthConstraint":{"minimum":100,"maximum":220},"x":455,"y":-75},{"id":"N_FC_5","label":"原発再稼働における立地・周辺自\n治体の事実上の同意要件と安全協\n定の役割","title":"<div style=\"max-width: 300px; white-space: normal; overflow-wrap: break-word; font-size: 12px; color: rgb(71, 85, 105);\">2024年および2025年の報道によると、原子力発電所の再稼働には、法的拘束力はないものの、立地自治体および周辺自治体の理解と同意が事実上不可欠とされている。これは、電力会社と自治体間で締結される原子力安全協定に基づく事前協議や了解条項によるものであり、政府も「立地自治体や住民等関係者の理解と協力が必要」との方針を示している。例えば、2025年12月には新潟県の花角英世知事が柏崎刈羽原発6号機の再稼働に同意を正式に伝達し、北海道の鈴木直道知事も泊原発3号機の再稼働に同意を表明している。これらの同意判断は、安全性確認に加え、避難計画の整備、住民説明、経済効果などを総合的に考慮して行われている。また、福島第一原発事故以降、原子力災害対策重点区域（UPZ）が半径30km圏に拡大されたことで、周辺自治体の同意の重要性も増している。</div>","level":4,"color":{"background":"#dcfce7","border":"#3b82f6"},"font":{"color":"#14532d","size":14},"shape":"box","borderWidth":2,"value":1,"shadow":false,"widthConstraint":{"minimum":100,"maximum":220},"x":625,"y":-75},{"id":"N_FC_6","label":"使用済み核燃料最終処分地の選定\n状況","title":"<div style=\"max-width: 300px; white-space: normal; overflow-wrap: break-word; font-size: 12px; color: rgb(71, 85, 105);\">2025年の資源エネルギー庁および原子力発電環境整備機構（NUMO）の発表によると、日本では高レベル放射性廃棄物（使用済み核燃料）の最終処分方法として地層処分が採用されているものの、最終処分地はまだ決定されていません。処分地選定プロセスは「文献調査」「概要調査」「精密調査」の3段階で構成されており、現在、最初のステップである文献調査が北海道の寿都町と神恵内村、佐賀県の玄海町の3つの自治体で実施されています。</div>","level":4,"color":{"background":"#dcfce7","border":"#3b82f6"},"font":{"color":"#14532d","size":14},"shape":"box","borderWidth":2,"value":1,"shadow":false,"widthConstraint":{"minimum":100,"maximum":220},"x":811,"y":-75},{"id":"N_FC_7","label":"AIによる世界的な雇用への影響\nと社会構造の変化","title":"<div style=\"max-width: 300px; white-space: normal; overflow-wrap: break-word; font-size: 12px; color: rgb(71, 85, 105);\">2024年1月の国際通貨基金（IMF）の報告によると、AIは世界の雇用の約40%に影響を与え、先進国では約60%の雇用が影響を受けると予測されている。このうち先進国の雇用の約半分はAIの統合によって生産性が向上する可能性があるが、残りの半分は労働需要の減少、賃金の低下、雇用機会の喪失といった負の影響を受ける可能性がある。また、AIが仕事を奪うリスクは高賃金の労働者にも及ぶと指摘されている。</div>","level":4,"color":{"background":"#dcfce7","border":"#3b82f6"},"font":{"color":"#14532d","size":14},"shape":"box","borderWidth":2,"value":1,"shadow":false,"widthConstraint":{"minimum":100,"maximum":220},"x":1003,"y":-75}];
