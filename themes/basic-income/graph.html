px; white-space: normal; overflow-wrap: break-word; font-size: 12px; color: rgb(71, 85, 105);\">社会経済システム維持の重視。</div>","level":5,"color":{"background":"#f3e8ff","border":"#d8b4fe"},"font":{"color":"#581c87","size":14},"shape":"box","borderWidth":1,"value":1,"shadow":false,"widthConstraint":{"minimum":100,"maximum":220},"x":-835,"y":-150},{"id":"V_LIFE","label":"生命/生存","title":"<div style=\"max-width: 300px; white-space: normal; overflow-wrap: break-word; font-size: 12px; color: rgb(71, 85, 105);\">生命/生存の追求</div>","level":6,"color":{"background":"#eff6ff","border":"#3b82f6"},"font":{"color":"#581c87","size":14},"shape":"ellipse","borderWidth":3,"value":1,"shadow":{"enabled":true,"color":"rgba(59, 130, 246, 0.4)","size":15},"widthConstraint":{"minimum":100,"maximum":220},"x":-2096,"y":0},{"id":"V_SAFE","label":"安全/防衛","title":"<div style=\"max-width: 300px; white-space: normal; overflow-wrap: break-word; font-size: 12px; color: rgb(71, 85, 105);\">安全/防衛の追求</div>","level":8,"color":{"background":"#eff6ff","border":"#a855f7"},"font":{"color":"#581c87","size":14},"shape":"ellipse","borderWidth":1,"value":1,"shadow":false,"widthConstraint":{"minimum":100,"maximum":220},"x":-2815,"y":300},{"id":"V_SUST","label":"持続可能性","title":"<div style=\"max-width: 300px; white-space: normal; overflow-wrap: break-word; font-size: 12px; color: rgb(71, 85, 105);\">持続可能性の追求</div>","level":10,"color":{"background":"#eff6ff","border":"#a855f7"},"font":{"color":"#581c87","size":14},"shape":"ellipse","borderWidth":1,"value":1,"shadow":false,"widthConstraint":{"minimum":100,"maximum":220},"x":-2078,"y":600},{"id":"V_WLTH","label":"富/資産","title":"<div style=\"max-width: 300px; white-space: normal; overflow-wrap: break-word; font-size: 12px; color: rgb(71, 85, 105);\">富/資産の追求</div>","level":9,"color":{"background":"#eff6ff","border":"#a855f7"},"font":{"color":"#581c87","size":14},"shape":"ellipse","borderWidth":1,"value":1,"shadow":false,"widthConstraint":{"minimum":100,"maximum":220},"x":-2397,"y 220},"x":-2205,"y":450},{"id":"V_LOVE","label":"連帯/絆","title":"<div style=\"max-width: 300px; white-space: normal; overflow-wrap: break-word; font-size: 12px; color: rgb(71, 85, 105);\">連帯/絆の追求</div>","level":7,"color":{"background":"#eff6ff","border":"#a855f7"},"font":{"color":"#581c87","size":14},"shape":"ellipse","borderWidth":1,"value":1,"shadow":false,"widthConstraint":{"minimum":100,"maximum":220},"x":-1291,"y":150},{"id":"V_IDEN","label":"独自性/個","title":"<div style=\"max-width: 300px; white-space: normal; overflow-wrap: break-word; font-size: 12px; color: rgb(71, 85, 105);\">独自性/個の追求</div>","level":9,"color":{"background":"#eff6ff","border":"#a855f7"},"font":{"color":"#581c87","size":14},"shape":"ellipse","borderWidth":1,"value":1,"shadow":false,"widthConstraint":{"minimum":100,"maximum":220},"x":-1384,"y":450},{"id":"V_HOPE","label":"希望/可能性","title":"<div style=\"max-width: 300px; white-space: normal; overflow-wrap: break-word; font-size: 12px; color: rgb(71, 85, 105);\">希望/可能性の追求</div>","level":5,"color":{"background":"#eff6ff","border":"#a855f7"},"font":{"color":"#581c87","size":14},"shape":"ellipse","borderWidth":1,"value":1,"shadow":false,"widthConstraint":{"minimum":100,"maximum":220},"x":-692,"y":-150},{"id":"V_DIGN","label":"尊厳/誇り","title":"<div style=\"max-width: 300px; white-space: normal; overflow-wrap: break-word; font-size: 12px; color: rgb(71, 85, 105);\">尊厳/誇りの追求</div>","level":7,"color":{"background":"#eff6ff","border":"#a855f7"},"font":{"color":"#581c87","size":14},"shape":"ellipse","borderWidth":1,"value":1,"shadow":false,"widthConstraint":{"minimum":100,"maximum":220},"x":-1122,"y":150},{"id":"N_FC_1","label":"年1回の確定申告に基づく所得把\n...","title":"<div style=\"max-width: 300px; white-space: normal; overflow-wrap: break-word; font-size: 12px; color: rgb(71, 85, 105);\">年1回の確定申告に基づく所得把握は、迅速な国民支援に必要なタイムリーな所得把握を困難にする。これは、課税所得が確定申告（原則としてN+1年3月15日まで）によって初めて確定するため、年間の所得把握にタイムラグが生じるためである。また、確定申告データは日本全体の所得状況を十分に把握できないという制約がある。例えば、確定申告が不要な給与所得者や年金所得者の大部分（15歳以上の総人口の約30%にしか相当しない確定申告者と被扶養者を合わせても、約70%は確定申告をしていない）の所得情報は含まれていない。迅速な給付付き税額控除などの制度導入においても、個人の所得をいかに正確に把握するかが大きな課題とされている。政府は、マイナンバー制度を活用した所得情報把握の早期化やデータ連携の推進に取り組んでいるが、効率的なシステム整備や技術的な課題も存在するという事実。</div>","level":4,"color":{"background":"#eff6ff","border":"#3b82f6"},"font":{"color":"#14532d","size":14},"shape":"box","borderWidth":2,"value":1,"shadow":false,"widthConstraint":{"minimum":100,"maximum":220},"x":-1642,"y":-300},{"id":"N_FC_2","label":"定額減税の導入時、企業では事務\n...","title":"<div style=\"max-width: 300px; white-space: normal; overflow-wrap: break-word; font-size: 12px; color: rgb(71, 85, 105);\">定額減税の導入時、企業では事務処理の混乱や負担増が顕著に発生しました。帝国データバンクの調査では、企業の約7割（全国66.8%、東京都73.9%）が定額減税による事務負担が増加したと回答しています。この負担には、手続きの理解、作業時間の増加、給与計算システムの改修費用などが含まれます。また、自治体においても、調整給付の対象者推定、給付額計算、確認書送付といった膨大な事務作業が発生し、計算ミスの懸念が指摘されました。東京都内の区役所では、制度詳細の発表が遅れたため、システム改修や税額計算が非常にタイトなスケジュールで行われたとの報告があります。国民からの問い合わせも増加し、ある区役所では定額減税に関する問い合わせ電話が1日200件を超える日もあったと報じられています。制度の複雑さ（所得税と住民税の減税方法の違い、調整給付の存在、扶養家族の把握の難しさなど）が、企業や国民の混乱を招いた主な要因とされています。税理士からも事務負担増に対する不満の声が多く上がりましたという事実。</div>","level":4,"color":{"background":"#eff6ff","border":"#3b82f6"},"font":{"color":"#14532d","size":14},"shape":"box","borderWidth":2,"value":1,"shadow":false,"widthConstraint":{"minimum":100,"maximum":220},"x":-1595,"y":-300},{"id":"N_FC_3","label":"日本において、新たな給付・控除\n...","title":"<div style=\"max-width: 300px; white-space: normal; overflow-wrap: break-word; font-size: 12px; color: rgb(71, 85, 105);\">日本において、新たな給付・控除制度の導入は、「年収の壁」として知られる「働き損ゾーン」の問題を引き起こすことが確認されている。例えば、パート労働者が年収106万円や130万円の壁を超えると、社会保険料の負担が生じ、手取り収入が減少する可能性がある。これにより、労働者は就業調整を行い、労働時間の抑制につながる。政府は、この問題に対し「年収の壁・支援強化パッケージ」を導入し、社会保険適用促進手当の支給や配偶者特別控除の適用範囲拡大（令和7年度税制改正で配偶者の給与水準160万円まで満額控除）などで対応している。また、給付や税制が分散的に決定されることで、社会保険料や給付削減を含む「実効限界税率」が高くなり、勤労意欲を阻害する「貧困の罠」が生じる可能性が指摘されている。さらに、物価高対策としての給付金とエネルギー補助金のように、政策目的が重複する複数の制度が安易に導入され、「ばらまき」と批判されるような重複が生じる事例も報告されている。補助金制度においても、同一経費に対する複数の補助金受給は原則不可とされており、制度の重複が問題となるという事実。</div>","level":4,"color":{"background":"#eff6ff","border":"#3b82f6"},"font":{"color":"#14532d","size":14},"shape":"box","borderWidth":2,"value":1,"shadow":false,"widthConstraint":{"minimum":100,"maximum":220},"x":-1546,"y":-300},{"id":"N_FC_4","label":"日本の行政運営では、アナログな\n...","title":"<div style=\"max-width: 300px; white-space: normal; overflow-wrap: break-word; font-size: 12px; color: rgb(71, 85, 105);\">日本の行政運営では、アナログな仕組みが前提の行政サービスにより非効率さが長年指摘されており、手書き書類の目視チェックや複数システムへの手入力といった業務で年間数兆円の人件費に相当する莫大な時間が費やされている。特に新型コロナウイルス危機では、給付金申請プロセスでの混乱によりデジタル化の遅れが浮き彫りになった。行政保有データは部署ごと、情報システムごとに個別に管理されることが多く、一度提出した情報の再提出が不要となる「ワンスオンリー」原則が十分に実現されていない。社会保障給付においても、国民の所得・資産情報が行政機関間で十分に共有されておらず、効果的かつきめ細やかな給付につながっていないため、財政資金の無駄や支援の漏れが生じている。また、地方自治体における電子決裁システムの導入率は全国平均で約2割にとどまり、地域間格差も大きい。マイナンバー制度の導入やガバメントデータハブの構築が進められているものの、マイナンバーの紐付け誤りや、一部手作業によるアナログな紐付けが行われていた事例も報告されており、情報連携基盤の整備と活用には依然として課題が残っているという事実。</div>","level":4,"color":{"background":"#eff6ff","border":"#3b82f6"},"font":{"color":"#14532d","size":14},"shape":"box","borderWidth":2,"value":1,"shadow":false,"widthConstraint":{"minimum":100,"maximum":220},"x":-1499,"y":-300},{"id":"N_FC_5","label":"日本において、消費税は逆進性を\n...","title":"<div style=\"max-width: 300px; white-space: normal; overflow-wrap: break-word; font-size: 12px; color: rgb(71, 85, 105);\">日本において、消費税は逆進性を持つとされ、低所得者ほど所得に占める税負担の割合が高くなる。例えば、年間収入350万円未満の世帯では、消費税率10%への増税による負担増が収入の1.5%～1.9%程度と試算されている一方、年収800万円以上の世帯では1%を切る。また、所得税、住民税、消費税、その他の税（固定資産税、酒税、たばこ税、揮発油税など）を合わせた実収入に対する税負担率は、年収200万円未満の低所得者層で10.8%、年収700万～800万円の層で10.9%と、所得による差がほとんどなくなり、税全体の累進性が失われていることが指摘されているという事実。</div>","level":4,"color":{"background":"#eff6ff","border":"#3b82f6"},"font":{"color":"#14532d","size":14},"shape":"box","borderWidth":2,"value":1,"shadow":false,"widthConstraint":{"minimum":100,"maximum":220},"x":-1451,"y":-300},{"id":"N_FC_6","label":"日本の財政負担は増大しており、\n...","title":"<div style=\"max-width: 300px; white-space: normal; overflow-wrap: break-word; font-size: 12px; color: rgb(71, 85, 105);\">日本の財政負担は増大しており、特に政府債務残高は対GDP比で世界最高水準にある。2024年の政府債務（対GDP比）は251.9%を記録し、2020年には過去最高の258.40%に達した。また、2025年末までには252.00%に達すると見込まれている。歳出面では、高齢化の急速な進展に伴い社会保障費が増加の一途をたどっており、令和7年度予算では国の一般歳出の約56%を社会保障関係費が占めている。社会保障負担率は1970年度の5.4%から2025年度には18.0%まで上昇しており、介護保険料は2024年度と比較して1.45倍程度に増加する試算もある。普通国債残高は累増し、令和7年度末には1,129兆円に上ると見込まれており、金利が上昇すれば利払費が大幅に増える可能性があるという事実。</div>","level":4,"color":{"background":"#eff6ff","border":"#3b82f6"},"font":{"color":"#14532d","size":14},"shape":"box","borderWidth":2,"value":1,"shadow":false,"widthConstraint":{"minimum":100,"maximum":220},"x":-1401,"y":-300},{"id":"N_FC_7","label":"日本は、GDPに対する政府債務\n...","title":"<div style=\"max-width: 300px; white-space: normal; overflow-wrap: break-word; font-size: 12px; color: rgb(71, 85, 105);\">日本は、GDPに対する政府債務残高が主要先進国の中で最も高い水準にあり、財政健全化が求められる状況にある。2020年にはGDP比258.40%という過去最高値を記録し、2024年には251.9%、2025年末までには252.00%に達する見込みである。財務省や内閣府などの政府機関は、受益と負担の不均衡、高齢化に伴う社会保障給付費の拡大、国債や通貨の信認低下リスクなどを理由に、財政健全化の必要性を明言している。政府は、国と地方を合わせた基礎的財政収支を2025年度までに黒字化し、同時に債務残高対GDP比の安定的な引き下げを目指す目標を掲げている。国の借金である普通国債残高は、2025年度末には1,129兆円に上ると見込まれているという事実。</div>","level":4,"color":{"background":"#eff6ff","border":"#3b82f6"},"font":{"color":"#14532d","size":14},"shape":"box","borderWidth":2,"value":1,"shadow":false,"widthConstraint":{"minimum":100,"maximum":220},"x":-1350,"y":-300},{"id":"N_FC_8","label":"2024年の定額減税や子育て支\n...","title":"<div style=\"max-width: 300px; white-space: normal; overflow-wrap: break-word; font-size: 12px; color: rgb(71, 85, 105);\">2024年の定額減税や子育て支援給付金は、効果の一時性や財源の不明確さから「選挙目当てのバラマキ」「国民を愚弄」と批判され、国民の不信感（「国が守ってくれないなら税金を納める意味はない」といった声）や政治への無関心（2024年衆院選投票率52.5%）につながった。政策の目的が不明確だと議論が不毛に終わるという指摘もある。また、スイスのサイバー防衛における多額の追加予算の説明不足が国民の不信感を強めた事例もある。日本国民の政治不信は強く、2024年調査では8割が「自分の意見を代弁している政党はない」と回答し、政党・国会・政府への不信感は6割以上に拡大している。政府や議会への信頼度はG7で最下位である。イプソスの2024年調査では、「既存の政党や政治家は、自分のような人間を気にかけてない」に同意する回答が8年間で1.6倍に拡大している。透明性の高い政策実施のためには「証拠に基づく政策立案（EBPM）」が重要とされ、約75%の政策立案者が十分なエビデンスを持っていないと感じているという事実。</div>","level":4,"color":{"background":"#eff6ff","border":"#3b82f6"},"font":{"color":"#14532d","size":14},"shape":"box","borderWidth":2,"value":1,"shadow":false,"widthConstraint":{"minimum":100,"maximum":220},"x":-1298,"y":-300},{"id":"N_FC_9","label":"日本の一般政府総債務対GDP比\n...","title":"<div style=\"max-width: 300px; white-space: normal; overflow-wrap: break-word; font-size: 12px; color: rgb(71, 85, 105);\">日本の一般政府総債務対GDP比は、1980年から2024年までの平均でGDPの149.81％であり、2020年には過去最高の258.40％を記録した。2023年時点でも主要7カ国（G7）で最も高い258%に達している。国と地方、社会保障基金を合わせた政府債務総額は、2025年4月時点で約1,466兆円、対GDP比で約235％に上るとされている。普通国債残高は2025年度末には1,129兆円に達する見込みである。長年にわたり、日本の財政は基礎的財政収支（プライマリーバランス）が赤字基調で推移しており、政府の直近の試算では2025年度に約3.2兆円の赤字が見込まれている。財政悪化の主な要因として、バブル崩壊後の景気低迷や減税による税収の減少、そして高齢化に伴う社会保障関係費の継続的な増加が挙げられる。社会保障関係費は国の歳出の大きな割合を占め、2014年度には112.1兆円に達している。国債費（元本返済と利払い）は国の歳出の約24.5％を占め、将来世代に大きな負担を残す可能性がある。財政の持続可能性については懸念が強く、国際通貨基金（IMF）も日本の債務GDP比率の突出を指摘している。このままでは累積債務の利払いだけで重い負担となり、財政健全化が手遅れになる可能性が指摘されている。ただし、政府の保有資産を差し引いたネット政府債務のGDP比は約134.2％であり、イタリアと同水準で、欧米主要国よりやや悪い程度という見方もある。また、日本の対外純資産は33年連続で世界一であり、国債の9割以上が国内で保有されている点も指摘されている。近年は名目GDP成長率が名目金利を上回る「ドーマー条件」が成立し、債務GDP比率が低下する傾向も見られるが、これはインフレによる一時的な効果である可能性も指摘されているという事実。</div>","level":4,"color":{"background":"#eff6ff","border":"#3b82f6"},"font":{"color":"#14532d","size":14},"shape":"box","borderWidth":2,"value":1,"shadow":false,"widthConstraint":{"minimum":100,"maximum":220},"x":-1244,"y":-300},{"id":"N_FC_10","label":"日本では、税・社会保障による再\n...","title":"<div style=\"max-width: 300px; white-space: normal; overflow-wrap: break-word; font-size: 12px; color: rgb(71, 85, 105);\">日本では、税・社会保障による再分配前の当初所得ジニ係数が1990年以降上昇傾向にあり、労働所得の格差も1987年以降緩やかに拡大している。非正規雇用の増加が労働所得格差拡大の主因の一つとされている。所得再分配後のジニ係数は2000年以降概ね横ばいまたは微減傾向にあるものの、所得税の最高税率が1980年の75%から現在の45%へ引き下げられるなど累進課税の緩和が進み、1989年導入の消費税は低所得層に負担を強いる逆進性を持つと指摘されている。特に、金融所得課税が一律20.315%であるため、高額所得者ほど税負担率が下がる「1億円の壁」と呼ばれる現象が存在し、超富裕層への課税強化が議論され、2025年度からはミニマムタックス制度が導入される。日本の相対的貧困率は1985年頃から上昇傾向にあり、非正規雇用の増加、高齢化、ひとり親世帯の増加などが低所得者層の生活不安定化の要因となっている。また、税・社会保障による所得再分配機能は高齢者世帯では機能しているが、現役世代においてはほとんど機能していないとの指摘がある。OECD諸国と比較して、日本の負担率の累進度は低く、低中所得層の社会保険料負担割合が高い傾向にあるという事実。</div>","level":4,"color":{"background":"#eff6ff","border":"#3b82f6"},"font":{"color":"#14532d","size":14},"shape":"box","borderWidth":2,"value":1,"shadow":false,"widthConstraint":{"minimum":100,"maximum":220},"x":-1189,"y":-300},{"id":"N_FC_11","label":"日本の政府は2024年時点でG\n...","title":"<div style=\"max-width: 300px; white-space: normal; overflow-wrap: break-word; font-size: 12px; color: rgb(71, 85, 105);\">日本の政府は2024年時点でGDP比237%の債務残高を抱え、歳出が税収を上回る状況が続き、その差は主に国債発行で賄われている。普通国債残高は2025年度末には1,129兆円に達すると見込まれており、金利が上昇すれば利払費が大幅に増加する可能性がある。政策資源は政府や独立行政法人等が有する予算、人員、設備等を指し、その有限性が認識されている。日本の予算制度は憲法に基づく「会計年度独立の原則（単年度主義）」を採用しており、各省庁の予算要求は財務省が設定する要求上限（シーリング）のもとで査定されるため、科学技術振興やインフラ整備など複数年を要する中長期的な政策課題への資源配分が阻害されるとの指摘がある。また、台湾の国家健康保険（健保）においても資源は有限であり、政策設計において患者の用薬権益を優先すべきとの意見があるという事実。</div>","level":4,"color":{"background":"#eff6ff","border":"#3b82f6"},"font":{"color":"#14532d","size":14},"shape":"box","borderWidth":2,"value":1,"shadow":false,"widthConstraint":{"minimum":100,"maximum":220},"x":-1130,"y":-300},{"id":"N_FC_12","label":"申請主義の政策では、高齢者や非\n...","title":"<div style=\"max-width: 300px; white-space: normal; overflow-wrap: break-word; font-size: 12px; color: rgb(71, 85, 105);\">申請主義の政策では、高齢者や非正規雇用者などの情報アクセスや手続き能力が低い層が、申請の複雑さや情報不足により支援を受けられない実態が広く指摘されている。例えば、閉じこもり高齢者は「見えない」存在となり、自ら相談窓口に行くことや移動が困難なため支援が届かないケースがある。また、認知症の症状や知的・精神障害により、必要な福祉サービスを適切に選択・利用することが難しい高齢者も存在するが、既存の支援は限定的である。非正規雇用者は、多忙さから役所への相談時間や申請手続きの時間を確保できないケースが多く、新型コロナウイルス感染拡大時には、多くの非正規雇用者がシフトを大幅に削減されても休業手当が支払われず、公的支援が行き届かない実態が明らかになった。日本の社会保障制度は細かく分けると400以上存在するとされるが、全ての制度をまとめた市民向けのホームページや広報媒体は存在せず、情報が断片的であるため、制度を知る機会が乏しいという課題がある。さらに、制度の説明文章の用語や表現が難解で、利用要件も複雑なものが多く、申請に必要な書類を揃えたり記入したりすることが困難である。行政窓口の縦割りや職員の知識不足、制度利用に対するスティグマ（負の烙印）も、人々が支援制度から遠ざかる要因となっている。生活保護の申請において「水際作戦」と呼ばれる、申請自体を阻止する行為が過去に何度も問題になっている事例も報告されているという事実。/申請主義の政策では、高齢者や非正規雇用者などの情報アクセスや手続き能力が低い層が、申請の複雑さや情報不足により支援を受けられない実態があるという事実。</div>","level":4,"color":{"background":"#eff6ff","border":"#3b82f6"},"font":{"color":"#14532d","size":17},"shape":"box","borderWidth":3.6,"value":3,"shadow":false,"widthConstraint":{"minimum":100,"maximum":220},"x":-1071,"y":-300},{"id":"N_FC_13","label":"日本政府は、社会保障制度の持続\n...","title":"<div style=\"max-width: 300px; white-space: normal; overflow-wrap: break-word; font-size: 12px; color: rgb(71, 85, 105);\">日本政府は、社会保障制度の持続可能性と効率性向上を目指し、英国のユニバーサル・クレジット型制度の導入可能性を検討する姿勢を示している。特に、2025年の自民党総裁選挙において、林芳正官房長官（当時）が「日本版ユニバーサル・クレジット構想」を掲げ、複数の社会保障給付の統合、就労インセンティブの強化、貧困緩和を目的とすることを提唱した。この構想は、所得、社会保険料、税負担を総合的に把握し、世帯のライフステージに応じた支援を行う枠組みである。また、2026年2月の総選挙後の高市総理の発言を受け、食料消費税ゼロ期間後に「給付付き税額控除」を導入する可能性が高まっており、これは低所得者への現金給付と納税者への税額控除を組み合わせた制度として、英国のユニバーサル・クレジットが有力な参照モデルとされている。自民党は衆院選で「所得に応じて手取りが増える様に制度設計を進める」としている。この制度設計については、自民党、日本維新の会、立憲民主党、公明党の4党が参加する「国民会議」での議論が予定されていたが、衆議院解散により設置が見送られた。しかし、2026年3月現在も与野党間で制度設計の議論が進められており、早ければ2027年に法案が提出され、実際の運用開始は2028年以降になる見通しという事実。</div>","level":4,"color":{"background":"#eff6ff","border":"#3b82f6"},"font":{"color":"#14532d","size":14},"shape":"box","borderWidth":2,"value":1,"shadow":false,"widthConstraint":{"minimum":100,"maximum":220},"x":-1012,"y":-300},{"id":"N_FC_14","label":"与党である自民党内では、林芳正\n...","title":"<div style=\"max-width: 300px; white-space: normal; overflow-wrap: break-word; font-size: 12px; color: rgb(71, 85, 105);\">与党である自民党内では、林芳正氏が英国型を参考に複数の社会保障給付を統合し就労インセンティブを強化する「日本版ユニバーサル・クレジット構想」を提唱している。一方、野党の立憲民主党は、消費税の逆進性対策として「給付付き税額控除」の導入を主張しており、自民党・公明党との間で制度設計に関する協議体も設置されている。日本維新の会も「勤労税額控除」を含む給付付き税額控除の検討を政策に掲げているが、過去には生活保護や基礎年金の廃止を伴う「ベーシックインカム」を提唱しており、既存の社会保障制度の扱いにおいて与党とは異なるアプローチを示している。これらの事実から、ユニバーサル・クレジット型制度の導入に関して、与野党間でその範囲、目的、既存制度との関係性において立場の違いが存在するという事実。</div>","level":4,"color":{"background":"#eff6ff","border":"#3b82f6"},"font":{"color":"#14532d","size":14},"shape":"box","borderWidth":2,"value":1,"shadow":false,"widthConstraint":{"minimum":100,"maximum":220},"x":-950,"y":-300},{"id":"N_FC_15","label":"米国EITC（勤労所得税額控除\n...","title":"<div style=\"max-width: 300px; white-space: normal; overflow-wrap: break-word; font-size: 12px; color: rgb(71, 85, 105);\">米国EITC（勤労所得税額控除）は、低所得層の労働意欲を高め、貧困の解消に資する目的で1975年に導入された制度である。この制度は、一定の所得までは勤労所得の増加に応じて税額控除額が増加する「逓増段階」を含む設計となっており、これにより就労インセンティブを強化する効果が期待されている。多くの実証研究により、EITCが低所得者の就労を促進することが示されており、特にこれまで働いていなかった人々が労働市場に参入し、貧困レベル以上の収入を得るようになることが観察されている。例えば、配偶者のいない母親の労働参加や就労促進に効果があるとされており、1986年のEITC拡充（控除額の引き上げ等）を挟む期間（1984～86年と1988～90年）で、配偶者のいない母親の労働参加率が2.8%増加したという分析結果がある。ただし、世帯の二次的な所得者に対しては就労インセンティブをわずかながら削ぐ方向に作用する可能性や、労働市場全体としての実証的有効性については必ずしも一致した結果が得られているわけではないという指摘もある。また、EITCの逓減段階が社会保険料の急増（いわゆる「年収の壁」）と合算されると、特定の所得帯で実効的な限界負担率が極めて高くなり、就労抑制効果が生じる可能性も指摘されているという事実。</div>","level":4,"color":{"background":"#eff6ff","border":"#3b82f6"},"font":{"color":"#14532d","size":14},"shape":"box","borderWidth":2,"value":1,"shadow":false,"widthConstraint":{"minimum":100,"maximum":220},"x":-893,"y":-300},{"id":"N_FC_16","label":"日本において、ユニバーサル・ク\n...","title":"<div style=\"max-width: 300px; white-space: normal; overflow-wrap: break-word; font-size: 12px; color: rgb(71, 85, 105);\">日本において、ユニバーサル・クレジット型制度（日本版ユニバーサル・クレジット構想や給付付き税額控除）の導入は、政治的・制度改革上の重要な論点となっている。2025年の自民党総裁選挙では、林芳正氏が「日本版ユニバーサルクレジット」の導入を政策として掲げた。また、2026年2月の総選挙後には、高市総理が給付付き税額控除の導入可能性に言及し、英国のユニバーサル・クレジットが有力な参照モデルとされている。与野党間では「国民会議」が設置され、2026年3月現在、制度設計の議論が進められており、早ければ2027年に法案提出、2028年以降の運用開始が見込まれている。この制度は、社会保障制度の簡素化、就労インセンティブの強化、貧困緩和を目指す「税・社会保障一体改革」の中核をなすものと位置づけられている。導入には、所得・資産の正確な把握、マイナンバーと銀行口座の紐付け、行政コスト、制度の複雑性、財源確保などの課題が指摘されている。過去には2017年に民進党が「日本型ベーシックインカム構想」を提唱するなど、同様の議論が国会でも行われてきたという事実。</div>","level":4,"color":{"background":"#eff6ff","border":"#3b82f6"},"font":{"color":"#14532d","size":14},"shape":"box","borderWidth":2,"value":1,"shadow":false,"widthConstraint":{"minimum":100,"maximum":220},"x":-830,"y":-300},{"id":"N_FC_17","label":"カナダのCWB（CanadaW\n...","title":"<div style=\"max-width: 300px; white-space: normal; overflow-wrap: break-word; font-size: 12px; color: rgb(71, 85, 105);\">カナダのCWB（CanadaWorkersBenefit）制度は、単身者にも給付を行っており、2025年には最大1,633カナダドル（調整後純所得が26,855カナダドルを超えると段階的に減額され、37,742カナダドルを超えると支給なし）が支給されます。2024年には最大1,590カナダドル（調整後純所得が26,149カナダドルを超えると段階的に減額され、36,749カナダドルを超えると支給なし）が支給されました。この制度は、低所得労働者を支援し、労働市場への積極的な参加を促すことを目的とした還付可能な税額控除であり、個人の経済的安定をもたらし、税負担を軽減または排除する上で重要な役割を果たすとされていますという事実。</div>","level":4,"color":{"background":"#eff6ff","border":"#3b82f6"},"font":{"color":"#14532d","size":14},"shape":"box","borderWidth":2,"value":1,"shadow":false,"widthConstraint":{"minimum":100,"maximum":220},"x":-770,"y":-300},{"id":"N_FC_18","label":"オランダは、2001年の税制改\n...","title":"<div style=\"max-width: 300px; white-space: normal; overflow-wrap: break-word; font-size: 12px; color: rgb(71, 85, 105);\">オランダは、2001年の税制改革において所得控除から税額控除へ移行し、「社会保険料減免型の給付付き税額控除」を導入しています。この制度では、所得税額が控除額に満たない場合、その差額を社会保険料から控除することで負担を軽減し、新たな給付執行機関を必要とせず手続きの簡素化が期待されています。このオランダ型の給付付き税額控除は、日本版TCB（給付付き税額控除）の導入において、所得税・社会保険料の一元管理の参考となると具体的に議論されています。さらに、オランダでは18歳未満の子供の健康保険料を政府が負担する制度や、保険料負担が困難な被保険者に対して政府が補助金を提供する医療サービス手当法（HealthCareAllowanceAct）に基づく措置も運用されていますという事実。</div>","level":4,"color":{"background":"#eff6ff","border":"#3b82f6"},"font":{"color":"#14532d","size":14},"shape":"box","borderWidth":2,"value":1,"shadow":false,"widthConstraint":{"minimum":100,"maximum":220},"x":-708,"y":-300},{"id":"N_FC_19","label":"英国は、2013年から段階的に\n...","title":"<div style=\"max-width: 300px; white-space: normal; overflow-wrap: break-word; font-size: 12px; color: rgb(71, 85, 105);\">英国は、2013年から段階的にユニバーサル・クレジット（UC）を導入し、従来の6つの給付制度（勤労税額控除、児童税額控除を含む）を統合する「控除＋給付」から「全額給付型」への移行を実施した。UCは労働所得に対する給付減額率を大幅に削減し、就労インセンティブを有意に改善したと評価されている一方、導入の遅延やITシステムの問題、一部受給者への影響などの課題も指摘されている。一方、フランスは家族手当や多子家庭向けの所得税優遇措置（N分N乗方式）など、税制上の控除と直接給付を組み合わせた家族給付制度を長年にわたり運用している。2013年には財政赤字削減のため、多子家庭向け優遇税制の見直しや富裕層への支援縮小を含む家族給付制度の改正が行われたが、これは既存制度の調整であり、英国のユニバーサル・クレジットのような「控除＋給付」から「全額給付型」への包括的な制度移行を実施したという客観的事実は確認できない。フランスの社会保障財源における租税の割合は増加しているものの、これは財源構造の変化であり、給付制度の根本的な「全額給付型」への移行を示すものではない。したがって、英国とフランスが共に「控除＋給付から全額給付型への移行を既に実施し、より効果的な給付制度を構築した」という事実については、フランスに関してその客観的事実が確認できないため、全体としては低いと判断されるという事実。</div>","level":4,"color":{"background":"#eff6ff","border":"#ef4444"},"font":{"color":"#14532d","size":14},"shape":"box","borderWidth":2,"value":1,"shadow":false,"widthConstraint":{"minimum":100,"maximum":220},"x":-640,"y":-300},{"id":"N_367","label":"制度抜本改革","title":"<div style=\"max-width: 300px; white-space: normal; overflow-wrap: break-word; font-size: 12px; color: rgb(71, 85, 105);\">現行制度の「複雑さ」と「不公平さ」が国民の信頼を損ない、「働いたのに手取りが減る」逆転現象や固定された所得制限が経済の変化を阻害している日本社会において、チームみらいは、国民の信頼を回復し、所得制限の壁を消失させ、低所得者への直接支援と中高所得者の負担調整を円滑に行い、2035年までに現役世代が将来に希望を持てるシンプルな社会制度を再構築するため、負の所得税とも呼ばれる「給付付き税額控除」を導入し、複雑に乱立している所得控除や生活支援の手当を一つの仕組みに一本化すべきである。</div>","level":2,"color":{"background":"#e0f2fe","border":"#7dd3fc"},"font":{"color":"#0c4a6e","size":14},"shape":"box","borderWidth":1,"value":1,"shadow":false,"widthConstraint":{"minimum":100,"maximum":220},"x":-64,"y":-600},{"id":"N_368","label":"年金透明化","title":"<div style=\"max-width: 300px; white-space: normal; overflow-wrap: break-word; font-size: 12px; color: rgb(71, 85, 105);\">財源の流用が指摘され、国民の不信感を招いている年金制度が存在する日本社会において、チームみらいは、年金制度の透明化を図るため、基礎年金を税方式化すべきである。</div>","level":2,"color":{"background":"#e0f2fe","border":"#7dd3fc"},"font":{"color":"#0c4a6e","size":14},"shape":"box","borderWidth":1,"value":1,"shadow":false,"widthConstraint":{"minimum":100,"maximum":220},"x":-1072,"y":-600},{"id":"N_369","label":"資産ベース支援","title":"<div style=\"max-width: 300px; white-space: normal; overflow-wrap: break-word; font-size: 12px; color: rgb(71, 85, 105);\">現行の支援制度が給与所得のみに焦点を当て、「真に支援が必要な人」に届いていない可能性がある日本社会において、チームみらいは、給与所得だけでなく資産も含めた「真に支援が必要な人」に支援が届く仕組みにするため、資産ベースの支援を導入すべきである。</div>","level":2,"color":{"background":"#e0f2fe","border":"#7dd3fc"},"font":{"color":"#0c4a6e","size":14},"shape":"box","borderWidth":1,"value":1,"shadow":false,"widthConstraint":{"minimum":100,"maximum":220},"x":-783,"y":-600},{"id":"N_370","label":"特例廃止・恒久化","title":"<div style=\"max-width: 300px; white-space: normal; overflow-wrap: break-word; font-size: 12px; color: rgb(71, 85, 105);\">ガソリン税の暫定税率のような「期限付きのまま放置された特例」が制度の複雑さや不公平さを生んでいる日本社会において、チームみらいは、制度の透明性と公平性を高め、経済の変化に適切に対応するため、そのような特例を原則廃止し、本則化・恒久化を図るべきである。</div>","level":2,"color":{"background":"#e0f2fe","border":"#7dd3fc"},"font":{"color":"#0c4a6e","size":14},"shape":"box","borderWidth":1,"value":1,"shadow":false,"widthConstraint":{"minimum":100,"maximum":220},"x":-586,"y":-600},{"id":"N_371","label":"現行の支援制度が給与所得のみに\n...","title":"<div style=\"max-width: 300px; white-space: normal; overflow-wrap: break-word; font-size: 12px; color: rgb(71, 85, 105);\">現行の支援制度が給与所得のみに焦点を当て、資産状況を考慮しないため、「真に支援が必要な人」に支援が届いていない可能性があるという事実。</div>","level":3,"color":{"background":"#eff6ff","border":"#86efac"},"font":{"color":"#14532d","size":14},"shape":"box","borderWidth":1,"value":1,"shadow":false,"widthConstraint":{"minimum":100,"maximum":220},"x":-949,"y":-450},{"id":"N_373","label":"現行制度の不備により、本来支援\n...","title":"<div style=\"max-width: 300px; white-space: normal; overflow-wrap: break-word; font-size: 12px; color: rgb(71, 85, 105);\">現行制度の不備により、本来支援が必要な人々が支援を受けられない状況に対する懸念と、その状況を改善したいという強い思いという感情。</div>","level":3,"color":{"background":"#f1f5f9","border":"#cbd5e1"},"font":{"color":"#475569","size":14},"shape":"box","borderWidth":1,"value":1,"shadow":false,"widthConstraint":{"minimum":100,"maximum":220},"x":-892,"y":-450},{"id":"N_374","label":"年金財源の流用が国民の不信感を\n...","title":"<div style=\"max-width: 300px; white-space: normal; overflow-wrap: break-word; font-size: 12px; color: rgb(71, 85, 105);\">年金財源の流用が国民の不信感を招いているという事実。</div>","level":3,"color":{"background":"#eff6ff","border":"#86efac"},"font":{"color":"#14532d","size":14},"shape":"box","borderWidth":2,"value":1,"shadow":false,"widthConstraint":{"minimum":100,"maximum":220},"x":-831,"y":-450},{"id":"N_376","label":"財源の流用疑惑による国民の年金\n...","title":"<div style=\"max-width: 300px; white-space: normal; overflow-wrap: break-word; font-size: 12px; color: rgb(71, 85, 105);\">財源の流用疑惑による国民の年金制度への不信感を解消し、将来への不安を軽減したいという感情。</div>","level":3,"color":{"background":"#f1f5f9","border":"#cbd5e1"},"font":{"color":"#475569","size":14},"shape":"box","borderWidth":1,"value":1,"shadow":false,"widthConstraint":{"minimum":100,"maximum":220},"x":-770,"y":-450},{"id":"N_377","label":"ガソリン税の暫定税率のような「\n...","title":"<div style=\"max-width: 300px; white-space: normal; overflow-wrap: break-word; font-size: 12px; color: rgb(71, 85, 105);\">ガソリン税の暫定税率のような「期限付きのまま放置された特例」が、制度の複雑さや不公平さを生んでいるという事実。</div>","level":3,"color":{"background":"#eff6ff","border":"#86efac"},"font":{"color":"#14532d","size":14},"shape":"box","borderWidth":2,"value":1,"shadow":false,"widthConstraint":{"minimum":100,"maximum":220},"x":-706,"y":-450},{"id":"N_379","label":"期限付き特例が放置され、制度の\n...","title":"<div style=\"max-width: 300px; white-space: normal; overflow-wrap: break-word; font-size: 12px; color: rgb(71, 85, 105);\">期限付き特例が放置され、制度の複雑さや不公平さを生んでいる現状に対する強い問題意識と、それを是正したいという思いという感情。</div>","level":3,"color":{"background":"#f1f5f9","border":"#cbd5e1"},"font":{"color":"#475569","size":14},"shape":"box","borderWidth":1,"value":1,"shadow":false,"widthConstraint":{"minimum":100,"maximum":220},"x":-655,"y":-450},{"id":"N_382","label":"2035年までに現役世代が将来\n...","title":"<div style=\"max-width: 300px; white-space: normal; overflow-wrap: break-word; font-size: 12px; color: rgb(71, 85, 105);\">2035年までに現役世代が将来に希望を持てる社会制度を構築し、不安なく生活できる未来を実現したいという感情。</div>","level":3,"color":{"background":"#f1f5f9","border":"#cbd5e1"},"font":{"color":"#475569","size":14},"shape":"box","borderWidth":1,"value":1,"shadow":false,"widthConstraint":{"minimum":100,"maximum":220},"x":-592,"y":-450},{"id":"N_383","label":"年金制度の財源の明確化","title":"<div style=\"max-width: 300px; white-space: normal; overflow-wrap: break-word; font-size: 12px; color: rgb(71, 85, 105);\">年金制度の財源の明確化の重視。</div>","level":3,"color":{"background":"#f3e8ff","border":"#d8b4fe"},"font":{"color":"#581c87","size":14},"shape":"box","borderWidth":1,"value":1,"shadow":false,"widthConstraint":{"minimum":100,"maximum":220},"x":-533,"y":-450},{"id":"N_384","label":"年金制度の運用の明確化","title":"<div style=\"max-width: 300px; white-space: normal; overflow-wrap: break-word; font-size: 12px; color: rgb(71, 85, 105);\">年金制度の運用の明確化 #14532d","size":14},"shape":"box","borderWidth":1,"value":1,"shadow":false,"widthConstraint":{"minimum":100,"maximum":220},"x":164,"y":-150},{"id":"N_443","label":"プロセスが最適であることで、資\n...","title":"<div style=\"max-width: 300px; white-space: normal; overflow-wrap: break-word; font-size: 12px; color: rgb(71, 85, 105);\">プロセスが最適であることで、資源の無駄が省かれ、効率が向上するという事実。</div>","level":5,"color":{"background":"#eff6ff","border":"#86efac"},"font":{"color":"#14532d","size":14},"shape":"box","borderWidth":1,"value":1,"shadow":false,"widthConstraint":{"minimum":100,"maximum":220},"x":338,"y":-150},{"id":"N_445","label":"構造の最適性が有効性をもたらす","title":"<div style=\"max-width: 300px; white-space: normal; overflow-wrap: break-word; font-size: 12px; color: rgb(71, 85, 105);\">構造の最適性が有効性をもたらすという事実。</div>","level":5,"color":{"background":"#eff6ff","border":"#86efac"},"font":{"color":"#14532d","size":14},"shape":"box","borderWidth":1,"value":1,"shadow":false,"widthConstraint":{"minimum":100,"maximum":220},"x":510,"y":-150},{"id":"N_446","label":"資源の維持","title":"<div style=\"max-width: 300px; white-space: normal; overflow-wrap: break-word; font-size: 12px; color: rgb(71, 85, 105);\">資源の維持の重視。</div>","level":8,"color":{"background":"#f3e8ff","border":"#d8b4fe"},"font":{"color":"#581c87","size":14},"shape":"box","borderWidth":1,"value":1,"shadow":false,"widthConstraint":{"minimum":100,"maximum":220},"x":-1707,"y":300},{"id":"N_447","label":"資源の保護","title":"<div style=\"max-width: 300px; white-space: normal; overflow-wrap: break-word; font-size: 12px; color: rgb(71, 85, 105);\">資源の保護の重視。</div>","level":8,"color":{"background":"#f3e8ff","border":"#d8b4fe"},"font":{"color":"#581c87","size":14},"shape":"box","borderWidth":1,"value":1,"shadow":false,"widthConstraint":{"minimum":100,"maximum":220},"x":-1514,"y":300},{"id":"N_FC_20","label":"日本の公的支援制度のうち、生活\n...","title":"<div style=\"max-width: 300px; white-space: normal; overflow-wrap: break-word; font-size: 12px; color: rgb(71, 85, 105);\">日本の公的支援制度のうち、生活保護制度は、預貯金、高価な物品、自動車、生活に必要不可欠でない不動産などの資産を生活費に充てることを受給の条件としている。また、生活困窮者自立支援制度の住居確保給付金や就労準備支援事業では、一定の資産収入等に関する要件を満たすことが対象となる。具体的には、住居確保給付金の場合、世帯の金融資産の合計が基準額以下であることが求められる。高等教育の修学支援新制度（大学無償化）においても、授業料等減免と給付型奨学金の対象者選定には、学力基準と家計基準（収入・資産）の両方が用いられ、2025年度からは資産基準が緩和された。求職者支援制度の給付金は、世帯全体の金融資産が300万円以下であることなどの資産要件がある。これらの制度は、給与所得だけでなく、預貯金や不動産などの資産状況も考慮して支援の可否や内容を決定しているという事実。</div>","level":4,"color":{"background":"#eff6ff","border":"#ef4444"},"font":{"color":"#14532d","size":14},"shape":"box","borderWidth":2,"value":1,"shadow":false,"widthConstraint":{"minimum":100,"maximum":220},"x":983,"y":-300},{"id":"N_FC_21","label":"日本では、配偶者控除や社会保険\n...","title":"<div style=\"max-width: 300px; white-space: normal; overflow-wrap: break-word; font-size: 12px; color: rgb(71, 85, 105);\">日本では、配偶者控除や社会保険料の負担が生じる「103万円の壁」「106万円の壁」「130万円の壁」といった所得制限が存在し、特に既婚女性のパート労働者が就業時間を調整する要因となっている。これにより、労働意欲が阻害され、労働供給が抑制されていると指摘されている。これらの「壁」の解消は、約70万人分の労働時間増加余地を生み出す可能性があり、人手不足が深刻化する日本経済にとって無視できないインパクトがあると試算されている。また、従来の福祉制度における所得制限は、所得が増えると給付が減るため、「働いても手取りが増えない」という「貧困の罠」や「福祉病（勤労意欲の低下）」を引き起こす一因と指摘されている。児童手当や高校無償化などの社会給付における所得制限は、高所得者層への「子育て罰」と批判され、行政コストの非効率性も指摘されている。政府は2026年度から高校授業料の無償化における所得制限を撤廃する改正法案を閣議決定するなど、所得制限の見直しを進めている。負の所得税（給付付き税額控除）は、所得が増えても手取り額が常に増え続けるように設計することで、勤労意欲を維持し、経済活動の活性化に寄与すると考えられているという事実。</div>","level":4,"color":{"background":"#eff6ff","border":"#3b82f6"},"font":{"color":"#14532d","size":14},"shape":"box","borderWidth":2,"value":1,"shadow":false,"widthConstraint":{"minimum":100,"maximum":220},"x":1087,"y":-300},{"id":"N_FC_22","label":"日本の年金制度において、過去に\n...","title":"<div style=\"max-width: 300px; white-space: normal; overflow-wrap: break-word; font-size: 12px; color: rgb(71, 85, 105);\">日本の年金制度において、過去には年金保険料が本来の年金給付以外の用途に安易に使われた「公的年金流用問題」が存在し、例えば「グリーンピア」事業では2003年度までに約8億円の赤字を計上し、国民の厳しい批判を招いた結果、2009年には社会保険庁が廃止された。また、2025年通常国会で議論されている年金改革法案では、将来の基礎年金（国民年金）を底上げするため、厚生年金に加入する会社員の受給額を2026年度から2045年度まで最大で月約7,000円一時的に減らし、その財源を基礎年金に充てる案が提示されており、経済界や労働者側からは「厚生年金積立金の流用」として不信感が高まっている。さらに、2019年の「2000万円報告書問題」や2015年の年金個人情報125万件流出なども、国民の年金制度への不信感を増幅させる要因となっているという事実。</div>","level":4,"color":{"background":"#eff6ff","border":"#3b82f6"},"font":{"color":"#14532d","size":14},"shape":"box","borderWidth":2,"value":1,"shadow":false,"widthConstraint":{"minimum":100,"maximum":220},"x":1176,"y":-300},{"id":"N_FC_23","label":"日本の社会保障制度や税制は専門\n...","title":"<div style=\"max-width: 300px; white-space: normal; overflow-wrap: break-word; font-size: 12px; color: rgb(71, 85, 105);\">日本の社会保障制度や税制は専門家でも理解が困難なほど複雑であり、特に所得控除は煩雑である。児童手当や大学無償化、保育料などの所得制限により、共働き世帯では夫の年収が約918万円や約960万円を境に可処分所得が減少する「逆転現象」が発生している。また、年収300万円と400万円の世帯間で大学無償化による実質収入の逆転も確認されている。2006年の国際比較調査では、日本の税負担率はOECD主要国で低い水準（22.1%）にもかかわらず、国民の60%以上が「税負担が高い」と感じており、税制改正プロセスの不透明性も国民の不信感につながっている。自民党の裏金問題も「税の不公平」として国民の関心を集めているという事実。</div>","level":4,"color":{"background":"#eff6ff","border":"#3b82f6"},"font":{"color":"#14532d","size":14},"shape":"box","borderWidth":2,"value":1,"shadow":false,"widthConstraint":{"minimum":100,"maximum":220},"x":1277,"y":-300},{"id":"N_FC_24","label":"日本では「103万円の壁」「1\n...","title":"<div style=\"max-width: 300px; white-space: normal; overflow-wrap: break-word; font-size: 12px; color: rgb(71, 85, 105);\">日本では「103万円の壁」「106万円の壁」「130万円の壁」といった所得制限により、一定の収入を超えると所得税や社会保険料の負担が生じ、手取り収入が減少する「逆転現象」が発生している。例えば、配偶者手当の喪失や社会保険料の自己負担開始により、年収が増えても手取りが減るケースがある。この現象は、特に被扶養配偶者や学生の「働き控え」や「就業調整」を引き起こし、労働供給の抑制を通じて経済成長を阻害する要因となっている。政府は「103万円の壁」を「160万円の壁」に引き上げる税制改正（令和7年度）や「106万円の壁」の撤廃検討を進めているが、社会保険の壁は依然として残る。また、高齢者においても「在職老齢年金制度」が働く意欲を阻害する要因と指摘されている。これらの複雑な制度や所得制限が、国民の勤労意欲を削ぎ、経済の変化を阻害しているとの指摘がある。給付付き税額控除は、このような「働いたら手取りが減る」現象を解消し、低所得者層の就労を促進し、所得再分配効果を通じて経済の安定を促進する効果が期待されている。過去20年間で日本の実質的な手取り収入は減少傾向にあり、これが経済停滞の一因とも指摘されているという事実。</div>","level":4,"color":{"background":"#eff6ff","border":"#3b82f6"},"font":{"color":"#14532d","size":14},"shape":"box","borderWidth":2,"value":1,"shadow":false,"widthConstraint":{"minimum":100,"maximum":220},"x":1372,"y":-300},{"id":"N_FC_25","label":"ガソリン税の暫定税率は、197\n...","title":"<div style=\"max-width: 300px; white-space: normal; overflow-wrap: break-word; font-size: 12px; color: rgb(71, 85, 105);\">ガソリン税の暫定税率は、1974年に道路整備のための臨時措置として導入され、当初2年間の予定であったにもかかわらず、50年以上にわたり延長され続けてきた「期限付きのまま放置された特例」である。この暫定税率（1リットルあたり25.1円）を含むガソリン税の仕組みは、本則税率、石油石炭税、地球温暖化対策税、消費税が複雑に絡み合い、ガソリン価格の約4割を税金が占める構造となっている。特に、ガソリン税に消費税が課される「二重課税」の状態は、長年批判の対象となってきた。また、2010年に導入された「トリガー条項」も税制をさらに複雑化させた。暫定税率の廃止は、国と地方を合わせて年間約1兆円から1.5兆円もの税収減につながるとされ、道路インフラの維持管理など地方財政への影響や、代替財源の確保が課題となっている。さらに、ガソリン減税は高所得世帯や都市部の住民に恩恵が偏り、低所得世帯や地方住民には効果が薄いなど、公平性に欠けるとの指摘がある。脱炭素社会への移行を目指す政府のGX戦略とも矛盾するとの意見も出ているという事実。</div>","level":4,"color":{"background":"#eff6ff","border":"#3b82f6"},"font":{"color":"#14532d","size":14},"shape":"box","borderWidth":2,"value":1,"shadow":false,"widthConstraint":{"minimum":100,"maximum":220},"x":1471,"y":-300},{"id":"N_F_DYN_273","label":"給付付き税額控除制度における不\n...","title":"<div style=\"max-width: 300px; white-space: normal; overflow-wrap: break-word; font-size: 12px; color: rgb(71, 85, 105);\">給付付き税額控除制度における不正受給のリスクとその影響という事実。</div>","level":4,"color":{"background":"#eff6ff","border":"#3b82f6"},"font":{"color":"#14532d","size":14},"shape":"box","borderWidth":2,"value":1,"shadow":false,"widthConstraint":{"minimum":100,"maximum":220},"x":1567,"y":-300},{"id":"N_FC_26","label":"財政破綻は、社会保障制度（年金\n...","title":"<div style=\"max-width: 300px; white-space: normal; overflow-wrap: break-word; font-size: 12px; color: rgb(71, 85, 105);\">財政破綻は、社会保障制度（年金、医療、介護、生活保護）や行政サービス（警察、消防、救急、ゴミ収集、公共交通機関、公共工事）の崩壊を招き、国民生活に直接的な影響を与える。例えば、救急車やゴミ収集が有料化し、治安が悪化する可能性がある。財政危機は、国債金利の急騰、利払い負担の増大、政府信用の失墜を引き起こし、通貨と国債の価値が暴落する金融危機につながる。アルゼンチンでは2001年のデフォルト後、通貨ペソが半年で約70%下落し、物価が約50%上昇、GDP成長率はマイナス5%、失業率は21.5%を超え、食料品や医薬品の不足、治安悪化、国民の海外流出といった事態が発生した。また、財政の公債依存は、将来世代への負担の先送り、経済危機や大規模災害時の機動的な財政対応余地の減少、国債や通貨の信認低下のリスク増大といった問題を引き起こす。韓国では財政赤字と国家債務の増加により、国家競争力ランキングが2年連続で下落し、財政部門で8ランク、金融部門で13ランク急落した事例があるという事実。</div>","level":5,"color":{"background":"#eff6ff","border":"#3b82f6"},"font":{"color":"#14532d","size":14},"shape":"box","borderWidth":2,"value":1,"shadow":false,"widthConstraint":{"minimum":100,"maximum":220},"x":677,"y":-150},{"id":"N_F_DYN_274","label":"給付付き税額控除制度における外\n...","title":"<div style=\"max-width: 300px; white-space: normal; overflow-wrap: break-word; font-size: 12px; color: rgb(71, 85, 105);\">給付付き税額控除制度における外国人の受給資格、脱税・不正受給のリスク、およびそれらに対する国際的な対策という事実。</div>","level":4,"color":{"background":"#eff6ff","border":"#3b82f6"},"font":{"color":"#14532d","size":14},"shape":"box","borderWidth":2,"value":1,"shadow":false,"widthConstraint":{"minimum":100,"maximum":220},"x":1710,"y":-300},{"id":"N_F_DYN_275","label":"英国のユニバーサル・クレジット\n...","title":"<div style=\"max-width: 300px; white-space: normal; overflow-wrap: break-word; font-size: 12px; color: rgb(71, 85, 105);\">英国のユニバーサル・クレジット（UC）制度の概要、メリット・デメリット、および日本の給付付き税額控除（TCB）への示唆という事実。</div>","level":5,"color":{"background":"#eff6ff","border":"#3b82f6"},"font":{"color":"#14532d","size":14},"shape":"box","borderWidth":2,"value":1,"shadow":false,"widthConstraint":{"minimum":100,"maximum":220},"x":862,"y":-150},{"id":"N_457","label":"脱税対策強化","title":"<div style=\"max-width: 300px; white-space: normal; overflow-wrap: break-word; font-size: 12px; color: rgb(71, 85, 105);\">脱税行為が横行し、財政的持続性や社会的モラルが脅かされている現状において、政府は財政的持続性を確保し、社会的なモラルを維持するために、脱税行為に対する罰則強化や取り締まり強化を徹底すべきである。</div>","level":2,"color":{"background":"#e0f2fe","border":"#7dd3fc"},"font":{"color":"#0c4a6e","size":14},"shape":"box","borderWidth":1,"value":1,"shadow":false,"widthConstraint":{"minimum":100,"maximum":220},"x":135,"y":-600},{"id":"N_458","label":"制度簡素化と公平性","title":"<div style=\"max-width: 300px; white-space: normal; overflow-wrap: break-word; font-size: 12px; color: rgb(71, 85, 105);\">脱税対策や給付制度の公平な運用に必要なシステム投資とコスト負担のバランスが課題となっている現状において、政府は執行コストを抑えつつ公平性を保ち、持続可能な制度を構築するために、制度を簡素化し、システム投資とコスト負担の最適なバランスを追求すべきである。</div>","level":2,"color":{"background":"#e0f2fe","border":"#7dd3fc"},"font":{"color":"#0c4a6e","size":14},"shape":"box","borderWidth":1,"value":1,"shadow":false,"widthConstraint":{"minimum":100,"maximum":220},"x":480,"y":-600},{"id":"N_459","label":"脱税行為が横行し、財政的持続性\n...","title":"<div style=\"max-width: 300px; white-space: normal; overflow-wrap: break-word; font-size: 12px; color: rgb(71, 85, 105);\">脱税行為が横行し、財政的持続性や社会的モラルが脅かされているという事実。</div>","level":3,"color":{"background":"#eff6ff","border":"#86efac"},"font":{"color":"#14532d","size":14},"shape":"box","borderWidth":2,"value":1,"shadow":false,"widthConstraint":{"minimum":100,"maximum":220},"x":889,"y":-450},{"id":"N_461","label":"脱税行為が財政と社会モラルを脅\n...","title":"<div style=\"max-width: 300px; white-space: normal; overflow-wrap: break-word; font-size: 12px; color: rgb(71, 85, 105);\">脱税行為が財政と社会モラルを脅かす現状に対する危機感、および公正な社会を求める感情という感情。</div>","level":3,"color":{"background":"#f1f5f9","border":"#cbd5e1"},"font":{"color":"#475569","size":14},"shape":"box","borderWidth":1,"value":1,"shadow":false,"widthConstraint":{"minimum":100,"maximum":220},"x":982,"y":-450},{"id":"N_462","label":"脱税対策や給付制度の公平な運用\n...","title":"<div style=\"max-width: 300px; white-space: normal; overflow-wrap: break-word; font-size: 12px; color: rgb(71, 85, 105);\">脱税対策や給付制度の公平な運用に必要なシステム投資と、そのコスト負担とのバランスが課題となっているという事実。</div>","level":3,"color":{"background":"#eff6ff","border":"#86efac"},"font":{"color":"#14532d","size":14},"shape":"box","borderWidth":2,"value":1,"shadow":false,"widthConstraint":{"minimum":100,"maximum":220},"x":1075,"y":-450},{"id":"N_464","label":"複雑な制度や高い執行コストが、\n...","title":"<div style=\"max-width: 300px; white-space: normal; overflow-wrap: break-word; font-size: 12px; color: rgb(71, 85, 105);\">複雑な制度や高い執行コストが、公平性を損ない、制度の持続可能性を危うくしている現状に対する懸念という感情。</div>","level":3,"color":{"background":"#f1f5f9","border":"#cbd5e1"},"font":{"color":"#475569","size":14},"shape":"box","borderWidth":1,"value":1,"shadow":false,"widthConstraint":{"minimum":100,"maximum":220},"x":1168,"y":-450},{"id":"N_465","label":"財政的持続性","title":"<div style=\"max-width: 300px; white-space: normal; overflow-wrap: break-word; font-size: 12px; color: rgb(71, 85, 105);\">財政的持続性の重視。</div>","level":3,"color":{"background":"#f3e8ff","border":"#d8b4fe"},"font":{"color":"#581c87","size":14},"shape":"box","borderWidth":1,"value":1,"shadow":false,"widthConstraint":{"minimum":100,"maximum":220},"x":1258,"y":-450},{"id":"N_466","label":"社会的モラル","title":"<div style=\"max-width: 300px; white-space: normal; overflow-wrap: break-word; font-size: 12px; color: rgb(71, 85, 105);\">社会的モラルの重視。</div>","level":3,"color":{"background":"#f3e8ff","border":"#d8b4fe"},"font":{"color":"#581c87","size":14},"shape":"box","borderWidth":1,"value":1,"shadow":false,"widthConstraint":{"minimum":100,"maximum":220},"x":1357,"y":-450},{"id":"N_467","label":"公平なサービス提供","title":"<div style=\"max-width: 300px; white-space: normal; overflow-wrap: break-word; font-size: 12px; color: rgb(71, 85, 105);\">公平なサービス提供の重視。</div>","level":3,"color":{"background":"#f3e8ff","border":"#d8b4fe"},"font":{"color":"#581c87","size":14},"shape":"box","borderWidth":1,"value":1,"shadow":false,"widthConstraint":{"minimum":100,"maximum":220},"x":1469,"y":-450},{"id":"N_468","label":"税金の効率的使用","title":"<div style=\"max-width: 300px; white-space: normal; overflow-wrap: break-word; font-size: 12px; color: rgb(71, 85, 105);\">税金の効率的使用の重視。</div>","level":3,"color":{"background":"#f3e8ff","border":"#d8b4fe"},"font":{"color":"#581c87","size":14},"shape":"box","borderWidth":1,"value":1,"shadow":false,"widthConstraint":{"minimum":100,"maximum":220},"x":1612,"y":-450},{"id":"N_469","label":"制度の持続可能性","title":"<div style=\"max-width: 300px; white-space: normal; overflow-wrap: break-word; font-size: 12px; color: rgb(71, 85, 105);\">制度の持続可能性の重視。</div>","level":3,"color":{"background":"#f3e8ff","border":"#d8b4fe"},"font":{"color":"#581c87","size":14},"shape":"box","borderWidth":1,"value":1,"shadow":false,"widthConstraint":{"minimum":100,"maximum":220},"x":1780,"y":-450},{"id":"N_470","label":"公共","title":"<div style=\"max-width: 300px; white-space: normal; overflow-wrap: break-word; font-size: 12px; color: rgb(71, 85, 105);\">公共の重視。</div>","level":4,"color":{"background":"#f3e8ff","border":"#d8b4fe"},"font":{"color":"#581c87","size":14},"shape":"box","borderWidth":1,"value":1,"shadow":false,"widthConstraint":{"minimum":100,"maximum":220},"x":1896,"y":-300},{"id":"N_471","label":"公的資源の有効活用が公共の利益\n...","title":"<div style=\"max-width: 300px; white-space: normal; overflow-wrap: break-word; font-size: 12px; color: rgb(71, 85, 105);\">公的資源の有効活用が公共の利益を増進するという事実。</div>","level":4,"color":{"background":"#eff6ff","border":"#86efac"},"font":{"color":"#14532d","size":14},"shape":"box","borderWidth":2,"value":1,"shadow":false,"widthConstraint":{"minimum":100,"maximum":220},"x":2092,"y":-300},{"id":"N_472","label":"社会全体の公正なあり方","title":"<div style=\"max-width: 300px; white-space: normal; overflow-wrap: break-word; font-size: 12px; color: rgb(71, 85, 105);\">社会全体の公正なあり方の重視。</div>","level":5,"color":{"background":"#f3e8ff","border":"#d8b4fe"},"font":{"color":"#581c87","size":14},"shape":"box","borderWidth":1,"value":1,"shadow":false,"widthConstraint":{"minimum":100,"maximum":220},"x":1054,"y":-150},{"id":"N_473","label":"個々の利益を超えた全体最適の追\n...","title":"<div style=\"max-width: 300px; white-space: normal; overflow-wrap: break-word; font-size: 12px; color: rgb(71, 85, 105);\">個々の利益を超えた全体最適の追求が、社会全体の公正な秩序を形成するという事実。</div>","level":5,"color":{"background":"#eff6ff","border":"#86efac"},"font":{"color":"#14532d","size":14},"shape":"box","borderWidth":1,"value":1,"shadow":false,"widthConstraint":{"minimum":100,"maximum":220},"x":1994,"y":-150},{"id":"N_FC_27","label":"日本における脱税の実態と財政・\n社会モラルへの影響","title":"<div style=\"max-width: 300px; white-space: normal; overflow-wrap: break-word; font-size: 12px; color: rgb(71, 85, 105);\">国税庁の査察（強制調査）による脱税摘発状況を見ると、令和6年度には98件の脱税事件が告発され、脱税総額は約82億円に上った。この脱税総額は2年連続で減少傾向にあるものの、消費税不正還付事案や国際事案、無申告事案など、悪質性の高い脱税行為が継続的に摘発されている。脱税は、国や地方自治体の公共サービスに必要な財源を減少させ、財政的持続性を脅かす。また、「納税する方が損をしている」という不公平感を生み出し、国民の間にモラルハザードを広げるなど、社会的なモラルを著しく損なう重大な不正行為であると指摘されている。</div>","level":4,"color":{"background":"#eff6ff","border":"#3b82f6"},"font":{"color":"#14532d","size":14},"shape":"box","borderWidth":2,"value":1,"shadow":false,"widthConstraint":{"minimum":100,"maximum":220},"x":2279,"y":-300},{"id":"N_FC_28","label":"税・給付システム投資の巨額化と\n費用対効果の課題","title":"<div style=\"max-width: 300px; white-space: normal; overflow-wrap: break-word; font-size: 12px; color: rgb(71, 85, 105);\">国税庁は脱税対策として次世代システム「KSK2」に巨額の予算を投じ、AIを活用した調査対象選定により、法人税・消費税で約3,400億円、所得税で約1,400億円の追徴税額を記録するなど、投資対効果を追求している。一方、社会保障・税番号制度（マイナンバー制度）のシステム構築にかかる総事業費は、当初見積もりの約3,000億円に対し、3兆円を超える規模に膨れ上がっており、初期見積もりの10倍以上となっている。この巨額投資にもかかわらず、「多額投資に見合う便利さがない」との指摘があり、マイナンバーカードと健康保険証の一体化では紐付け誤りが0.007%発生し、総点検が必要となる事態も生じている。また、マイナンバーカードへの運転免許証機能搭載など「中途半端なカード統合」により、従来のカードを廃止できず、行政コストが増大するとの指摘もある。これらの事例は、脱税対策や給付制度の公平な運用に必要なシステム投資とそのコスト負担とのバランスが、特に給付制度側で費用対効果の面で大きな課題となっていることを示している。</div>","level":4,"color":{"background":"#eff6ff","border":"#3b82f6"},"font":{"color":"#14532d","size":14},"shape":"box","borderWidth":2,"value":1,"shadow":false,"widthConstraint":{"minimum":100,"maximum":220},"x":2472,"y":-300}];
