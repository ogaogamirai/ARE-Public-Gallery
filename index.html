<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARE Public Gallery</title>
    <!-- Tailwind CSS for modern design -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>

<body class="bg-gray-50 min-h-screen text-gray-900">
    <div class="max-w-6xl mx-auto px-6 py-12">
        <header class="mb-12">
            <h1 class="text-4xl font-extrabold text-gray-900 mb-4 tracking-tight">ARE Public Gallery</h1>
            <p class="text-lg text-gray-600 max-w-2xl">
                Agora Resolution Engine (ARE) によって構造化・分析された論理グラフと解析データです。
            </p>
        </header>

        <div id="gallery-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            <!-- GALLERY_START -->

        <div class="bg-white rounded-2xl border border-gray-200 overflow-hidden shadow-sm hover:shadow-md transition-all group">
            <div class="p-6">
                <div class="flex justify-between items-start mb-3">
                    <span class="px-2 py-1 bg-blue-50 text-blue-600 text-[10px] font-bold rounded uppercase tracking-wider">未分類</span>
                    <span class="text-[10px] text-gray-400 font-mono">/themes/basic-income</span>
                </div>
                <h3 class="text-lg font-bold text-gray-800 mb-2 group-hover:text-blue-600 transition-colors">Basic Income</h3>
                <p class="text-sm text-gray-500 leading-relaxed mb-6 line-clamp-2">AREによって抽出された論理トポロジーと解析データです。</p>
                
                <div class="flex gap-2">
                    
                    <a href="themes/basic-income/graph.html" target="_blank" class="flex-1 bg-slate-800 hover:bg-slate-900 text-white text-center py-2 rounded-xl text-xs font-bold transition-all flex items-center justify-center gap-2">
                        <i class="fas fa-project-diagram"></i> View Graph
                    </a>
                    
                    <a href="themes/basic-income/report.md" target="_blank" class="px-4 border border-gray-200 hover:bg-gray-50 text-gray-600 py-2 rounded-xl text-xs font-bold transition-all flex items-center justify-center" title="Download Report">
                        <i class="fas fa-file-alt"></i>
                    </a>
                    
                    <a href="themes/basic-income/data.json" target="_blank" class="px-4 border border-gray-200 hover:bg-gray-50 text-gray-600 py-2 rounded-xl text-xs font-bold transition-all flex items-center justify-center" title="Download Data">
                        <i class="fas fa-database"></i>
                    </a>
                </div>
            </div>
        </div>
    

        <div class="bg-white rounded-2xl border border-gray-200 overflow-hidden shadow-sm hover:shadow-md transition-all group">
            <div class="p-6">
                <div class="flex justify-between items-start mb-3">
                    <span class="px-2 py-1 bg-blue-50 text-blue-600 text-[10px] font-bold rounded uppercase tracking-wider">未分類</span>
                    <span class="text-[10px] text-gray-400 font-mono">/themes/empty-house</span>
                </div>
                <h3 class="text-lg font-bold text-gray-800 mb-2 group-hover:text-blue-600 transition-colors">Empty House</h3>
                <p class="text-sm text-gray-500 leading-relaxed mb-6 line-clamp-2">AREによって抽出された論理トポロジーと解析データです。</p>
                
                <div class="flex gap-2">
                    
                    <a href="themes/empty-house/graph.html" target="_blank" class="flex-1 bg-slate-800 hover:bg-slate-900 text-white text-center py-2 rounded-xl text-xs font-bold transition-all flex items-center justify-center gap-2">
                        <i class="fas fa-project-diagram"></i> View Graph
                    </a>
                    
                    <a href="themes/empty-house/report.md" target="_blank" class="px-4 border border-gray-200 hover:bg-gray-50 text-gray-600 py-2 rounded-xl text-xs font-bold transition-all flex items-center justify-center" title="Download Report">
                        <i class="fas fa-file-alt"></i>
                    </a>
                    
                    <a href="themes/empty-house/data.json" target="_blank" class="px-4 border border-gray-200 hover:bg-gray-50 text-gray-600 py-2 rounded-xl text-xs font-bold transition-all flex items-center justify-center" title="Download Data">
                        <i class="fas fa-database"></i>
                    </a>
                </div>
            </div>
        </div>
    
<!-- GALLERY_END -->
        </div>

        <footer class="mt-20 pt-8 border-t border-gray-200 text-center text-gray-400 text-sm">
            <p>&copy; 2026 Agora Resolution Engine. Created with Antigravity.</p>
        </footer>
    </div>
</body>

</html>
